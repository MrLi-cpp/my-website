<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>用户密钥管理 — 霁光</title>
  <link rel="stylesheet" href="/style.css?v=2">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0c0c0e; --bg-card: #141417; --bg-hover: #1a1a1e;
      --gold: #c9a96e; --gold-dim: rgba(201,169,110,0.2);
      --red: #c0392b; --text: #f0ece6; --text-muted: #a09a90;
      --text-dim: #6b6560; --border: rgba(255,255,255,0.06);
      --font-serif: 'Songti SC', 'STSong', 'SimSun', 'Noto Serif SC', Georgia, serif;
      --font-sans: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-y: auto;
    }

    /* 顶部导航 */
    .admin-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(12,12,14,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .admin-header-brand {
      font-family: var(--font-serif);
      font-size: 16px;
      letter-spacing: 6px;
      color: var(--gold);
    }
    .admin-header-links a {
      text-decoration: none;
      margin-left: 16px;
    }

    /* 主体 */
    .admin-body {
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .page-title {
      font-family: var(--font-serif);
      font-size: 24px;
      letter-spacing: 6px;
      color: var(--text);
      margin-bottom: 8px;
      font-weight: 400;
    }
    .page-subtitle {
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 2px;
      margin-bottom: 36px;
    }

    .panel-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
    }

    /* 密钥表格 */
    .key-table {
      width: 100%;
      border-collapse: collapse;
    }
    .key-table thead th {
      text-align: left;
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 2px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 400;
    }
    .key-table tbody td {
      padding: 14px 16px;
      font-size: 14px;
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
    }
    .key-table tbody tr:last-child td {
      border-bottom: none;
    }
    .key-table tbody tr:hover {
      background: var(--bg-hover);
    }
    .key-username {
      color: var(--text);
      font-weight: 500;
      letter-spacing: 1px;
    }
    .key-code {
      font-family: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 1.5px;
      color: var(--gold);
      background: var(--gold-dim);
      padding: 4px 10px;
      border-radius: 4px;
      user-select: all;
      cursor: pointer;
    }
    .key-code:hover {
      background: rgba(201,169,110,0.3);
    }
    .key-copy {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 1px;
      cursor: pointer;
      transition: color 0.3s;
      margin-left: 8px;
    }
    .key-copy:hover { color: var(--gold); }

    .empty-state {
      text-align: center;
      color: var(--text-dim);
      padding: 60px 0;
      font-size: 14px;
      letter-spacing: 2px;
    }
    .error-state {
      text-align: center;
      color: var(--red);
      padding: 60px 0;
      font-size: 14px;
      letter-spacing: 2px;
    }

    .refresh-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .count-label {
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    @media (max-width: 640px) {
      .admin-header { padding: 0 16px; }
      .admin-header-links a { margin-left: 12px; }
      .admin-body { padding: 24px 16px 60px; }
      .key-table thead th, .key-table tbody td { padding: 10px 8px; font-size: 13px; }
      .key-code { font-size: 11px; padding: 3px 6px; }
    }
  </style>
</head>
<body>

  <header class="admin-header">
    <div class="admin-header-brand">霁光</div>
    <div class="admin-header-links">
      <a href="/" class="btn-standard">首页</a>
      <a href="/admin.html" class="btn-standard">后台</a>
    </div>
  </header>

  <div class="admin-body">
    <h1 class="page-title">用户密钥</h1>
    <p class="page-subtitle">USER ACCESS KEYS · 实时同步用户昵称</p>

    <div class="refresh-bar">
      <span class="count-label" id="countLabel">加载中...</span>
      <button class="btn-standard" onclick="loadKeys()">刷新</button>
    </div>

    <div class="panel-card" id="panelCard">
      <div class="empty-state" id="loadingState">加载中...</div>
    </div>
  </div>

  <script>
    const API_BASE = '';

    async function get(url) {
      const res = await fetch(API_BASE + url, { credentials: 'include' });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || '请求失败');
      }
      return res.json();
    }

    async function loadKeys() {
      const panel = document.getElementById('panelCard');
      const countLabel = document.getElementById('countLabel');
      panel.innerHTML = '<div class="empty-state">加载中...</div>';
      countLabel.textContent = '加载中...';

      try {
        const users = await get('/api/admin/keys');
        if (!users || users.length === 0) {
          panel.innerHTML = '<div class="empty-state">暂无注册用户</div>';
          countLabel.textContent = '0 位用户';
          return;
        }

        countLabel.textContent = `${users.length} 位用户`;

        // 每4位加空格显示
        const formatKey = (k) => {
          if (!k || k.length !== 16) return k || '-';
          return k.match(/.{4}/g).join(' ');
        };

        const html = `
          <table class="key-table">
            <thead>
              <tr>
                <th style="width:40%">用户昵称</th>
                <th>访问密钥</th>
              </tr>
            </thead>
            <tbody>
              ${users.map(u => `
                <tr>
                  <td><span class="key-username">${escapeHtml(u.username)}</span></td>
                  <td>
                    <span class="key-code" onclick="copyKey('${u.story_key}', this)" title="点击复制">${formatKey(u.story_key)}</span>
                    <span class="key-copy" onclick="copyKey('${u.story_key}', this.previousElementSibling)">复制</span>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
        panel.innerHTML = html;
      } catch (err) {
        panel.innerHTML = `<div class="error-state">${err.message || '加载失败，请确认管理员权限'}</div>`;
        countLabel.textContent = '加载失败';
      }
    }

    function copyKey(key, el) {
      navigator.clipboard.writeText(key).then(() => {
        const original = el.textContent;
        el.textContent = '已复制';
        el.style.color = '#4a8fc7';
        setTimeout(() => {
          el.textContent = original;
          el.style.color = '';
        }, 1500);
      }).catch(() => {
        // 降级方案
        const ta = document.createElement('textarea');
        ta.value = key;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        const original = el.textContent;
        el.textContent = '已复制';
        setTimeout(() => { el.textContent = original; }, 1500);
      });
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // 自动刷新（每30秒），确保昵称是最新的
    let autoRefresh = setInterval(loadKeys, 30000);
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        clearInterval(autoRefresh);
      } else {
        loadKeys();
        autoRefresh = setInterval(loadKeys, 30000);
      }
    });

    loadKeys();
  </script>

</body>
</html>

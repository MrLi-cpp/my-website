<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>留言 - 霁光</title>
  <link rel="stylesheet" href="/style.css?v=3">
  <style>
    html, body { background: var(--bg-primary); height: 100%; overflow: hidden; }
    .chat-wrap { display: flex; flex-direction: column; height: 100vh; max-width: 600px; margin: 0 auto; position: relative; }

    /* 头部 */
    .chat-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .chat-head .back { color: var(--text-muted); text-decoration: none; font-size: 13px; letter-spacing: 2px; transition: all 0.3s; padding: 4px 10px; border-radius: 6px; }
    .chat-head .back:hover { color: var(--accent-gold); background: rgba(201,169,110,0.08); transform: scale(1.05); }
    .chat-head .title { font-family: var(--font-serif); font-size: 16px; letter-spacing: 3px; }

    /* 消息区 */
    .chat-body { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }
    .chat-body::-webkit-scrollbar { width: 3px; }
    .chat-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* 日期分隔线 */
    .chat-date { text-align: center; margin: 12px 0; font-size: 11px; color: var(--text-muted); letter-spacing: 2px; opacity: 0.6; }

    /* 消息行 */
    .msg-row { display: flex; margin-bottom: 16px; align-items: flex-end; }
    .msg-row.self { flex-direction: row-reverse; }

    /* 气泡 */
    .msg-bubble {
      max-width: 70%; padding: 10px 14px; border-radius: 14px;
      font-size: 14px; line-height: 1.6; word-break: break-word;
      position: relative; transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .msg-bubble:hover { transform: scale(1.02); }
    .msg-row.self .msg-bubble {
      background: rgba(201,169,110,0.15); color: var(--text-primary);
      border: 1px solid rgba(201,169,110,0.25); border-bottom-right-radius: 4px;
    }
    .msg-row.other .msg-bubble {
      background: var(--bg-card); color: var(--text-primary);
      border: 1px solid var(--border); border-bottom-left-radius: 4px;
    }
    .msg-bubble.withdrawn { opacity: 0.5; font-style: italic; }

    /* 消息时间 */
    .msg-time { font-size: 10px; color: var(--text-muted); margin: 0 6px; opacity: 0.6; white-space: nowrap; }

    /* 图片消息 */
    .msg-img { max-width: 200px; max-height: 260px; border-radius: 10px; cursor: pointer; transition: transform 0.3s; border: 1px solid var(--border); }
    .msg-img:hover { transform: scale(1.03); }

    /* 视频消息 */
    .msg-video { max-width: 200px; max-height: 260px; border-radius: 10px; border: 1px solid var(--border); }

    /* 撤回按钮 */
    .msg-withdraw-btn {
      position: absolute; top: -24px; right: 0;
      background: rgba(192,57,43,0.9); color: #fff;
      border: none; border-radius: 4px; padding: 2px 8px;
      font-size: 11px; cursor: pointer; opacity: 0; transition: opacity 0.2s;
      pointer-events: none;
    }
    .msg-bubble:hover .msg-withdraw-btn { opacity: 1; pointer-events: auto; }
    .msg-row.self .msg-withdraw-btn { right: auto; left: 0; }

    /* 空状态 */
    .chat-empty { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 13px; letter-spacing: 2px; }

    /* 输入区 */
    .chat-foot { border-top: 1px solid var(--border); padding: 10px 12px; flex-shrink: 0; background: var(--bg-primary); }
    .chat-tool { display: flex; gap: 8px; margin-bottom: 8px; }
    .chat-tool label {
      width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 16px; color: var(--text-muted); transition: all 0.3s;
      background: var(--bg-card);
    }
    .chat-tool label:hover { border-color: var(--accent-gold); color: var(--accent-gold); transform: scale(1.1); }
    .chat-tool input { display: none; }
    .chat-input-row { display: flex; gap: 8px; align-items: flex-end; }
    .chat-textarea {
      flex: 1; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 18px; padding: 8px 14px; color: var(--text-primary);
      font-size: 14px; resize: none; outline: none; font-family: var(--font-sans);
      max-height: 100px; min-height: 36px; line-height: 1.5;
    }
    .chat-textarea:focus { border-color: rgba(201,169,110,0.4); }
    .chat-send {
      width: 36px; height: 36px; border-radius: 50%; border: none;
      background: var(--accent-gold); color: var(--bg-primary);
      font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; flex-shrink: 0;
    }
    .chat-send:hover { transform: scale(1.1); box-shadow: 0 4px 12px rgba(201,169,110,0.3); }
    .chat-send:active { transform: scale(0.95); }

    /* 大图预览 */
    .img-overlay {
      position: fixed; inset: 0; z-index: 3000; background: rgba(0,0,0,0.9);
      display: none; align-items: center; justify-content: center; cursor: zoom-out;
    }
    .img-overlay img { max-width: 90%; max-height: 90%; border-radius: 4px; }
    .img-overlay.show { display: flex; }

    /* 未登录覆盖层 */
    .login-overlay {
      position: fixed; inset: 0; z-index: 2000; background: var(--bg-primary);
      display: none; flex-direction: column; align-items: center; justify-content: center;
    }
    .login-overlay.show { display: flex; }
    .login-overlay p { font-size: 14px; color: var(--text-muted); letter-spacing: 3px; margin-bottom: 24px; }
    .login-overlay .btn-back {
      padding: 10px 28px; border: 1px solid var(--accent-gold); border-radius: 8px;
      background: transparent; color: var(--accent-gold); font-size: 13px; letter-spacing: 2px;
      cursor: pointer; font-family: var(--font-sans); transition: all 0.3s;
    }
    .login-overlay .btn-back:hover { background: rgba(201,169,110,0.1); transform: scale(1.05); }

    /* 会话列表 */
    .session-list-view { flex: 1; overflow-y: auto; padding: 16px; }
    .session-list-header { text-align: center; font-size: 13px; color: var(--text-muted); letter-spacing: 2px; margin-bottom: 16px; }
    .session-card {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
      background: var(--bg-card);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      position: relative;
    }
    .session-card:hover {
      border-color: rgba(201,169,110,0.3);
      transform: scale(1.02);
    }
    .session-card.has-unread {
      border-color: rgba(192, 57, 43, 0.35);
      box-shadow: 0 0 10px rgba(192, 57, 43, 0.08);
    }
    .session-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--bg-secondary);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: var(--accent-gold);
      border: 1px solid var(--border);
      flex-shrink: 0;
      position: relative;
    }
    .session-avatar-badge {
      position: absolute;
      top: -2px; right: -2px;
      width: 18px; height: 18px;
      z-index: 10;
      opacity: 0;
      transform: scale(0);
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .session-avatar-badge.show {
      opacity: 1;
      transform: scale(1);
    }
    .session-avatar-arc {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(192, 57, 43, 0.6);
      box-shadow: 0 0 6px rgba(192, 57, 43, 0.3);
    }
    .session-avatar-dot {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      min-width: 14px; height: 14px;
      background: var(--accent-red);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 9px;
      font-weight: 600;
      padding: 0 2px;
      box-shadow: 0 0 4px rgba(192, 57, 43, 0.5);
    }
    .session-info { flex: 1; min-width: 0; }
    .session-name {
      font-size: 14px; color: var(--text-primary);
      letter-spacing: 1px; margin-bottom: 4px;
    }
    .session-preview {
      font-size: 12px; color: var(--text-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .session-preview.unread {
      color: var(--text-primary);
      font-weight: 500;
    }
    .session-time {
      font-size: 11px; color: var(--text-muted);
      flex-shrink: 0;
    }
    .session-badge {
      position: absolute;
      top: 8px; right: 10px;
      min-width: 18px; height: 18px;
      background: var(--accent-red);
      color: #fff;
      font-size: 11px;
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 5px;
      font-weight: 500;
    }
    .session-empty {
      text-align: center; padding: 60px 20px;
      color: var(--text-muted); font-size: 13px; letter-spacing: 2px;
    }
    .session-new-btn {
      display: block; width: calc(100% - 32px); max-width: 300px;
      margin: 0 auto 20px; padding: 12px;
      border: 1px solid var(--accent-gold); border-radius: 8px;
      background: transparent; color: var(--accent-gold);
      font-size: 13px; letter-spacing: 2px; cursor: pointer;
      text-align: center; transition: all 0.3s;
    }
    .session-new-btn:hover {
      background: var(--accent-gold); color: var(--bg-primary);
    }

    /* 头部操作按钮 */
    .chat-head-actions {
      display: flex; gap: 8px;
    }
    .chat-head-btn {
      padding: 4px 10px;
      border: 1px solid var(--border); border-radius: 4px;
      background: transparent; color: var(--text-muted);
      font-size: 11px; letter-spacing: 1px;
      cursor: pointer; transition: all 0.3s;
    }
    .chat-head-btn:hover {
      border-color: var(--accent-gold); color: var(--accent-gold);
    }
    /* 新私信弹窗 */
    .new-chat-overlay {
      position: fixed; inset: 0; z-index: 4000;
      background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .new-chat-overlay.active { opacity: 1; pointer-events: auto; }
    .new-chat-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px 24px;
      max-width: 340px; width: 90%;
      text-align: center;
      transform: scale(0.9);
      transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .new-chat-overlay.active .new-chat-box { transform: scale(1); }
    .new-chat-box h4 {
      font-family: var(--font-serif);
      font-size: 16px; color: var(--accent-gold);
      letter-spacing: 3px; margin-bottom: 16px;
    }
    .new-chat-box input {
      width: 100%;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    .new-chat-box input:focus { border-color: var(--accent-gold); }
    .new-chat-box .new-chat-btns {
      display: flex; gap: 10px; justify-content: center;
    }
    .new-chat-box .new-chat-btn {
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 13px; letter-spacing: 1px;
      cursor: pointer; transition: all 0.3s;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
    }
    .new-chat-box .new-chat-btn:hover {
      border-color: var(--accent-gold);
      color: var(--accent-gold);
    }
    .new-chat-box .new-chat-btn.primary {
      background: var(--accent-gold);
      border-color: var(--accent-gold);
      color: var(--bg-primary);
    }
    .new-chat-box .new-chat-btn.primary:hover {
      filter: brightness(1.1);
    }
    .new-chat-error {
      color: var(--accent-red);
      font-size: 12px; margin-bottom: 10px;
      min-height: 18px;
    }
  </style>
</head>
<body>

  <div class="chat-wrap">
    <!-- 头部 -->
    <div class="chat-head">
      <a class="back" href="/" onclick="return goBack();">← 返回</a>
      <div class="title" id="chatTitle">私信</div>
      <button class="chat-head-btn" id="listBtn" style="display:none;" onclick="showSessionList()">列表</button>
    </div>

    <!-- 会话列表视图 -->
    <div class="session-list-view" id="sessionListView" style="display:none;">
      <div class="session-list-header">所有会话</div>
      <button class="session-new-btn" onclick="startNewChat()">✚ 新私信</button>
      <div id="sessionListBody"></div>
    </div>

    <!-- 消息区 -->
    <div class="chat-body" id="chatBody"></div>

    <!-- 输入区 -->
    <div class="chat-foot" id="chatFoot">
      <div class="chat-tool">
        <label title="图片">📷<input type="file" id="imgInp" accept="image/*" onchange="sendFile(this, 'image')"></label>
        <label title="视频">🎬<input type="file" id="vidInp" accept="video/*" onchange="sendFile(this, 'video')"></label>
      </div>
      <div class="chat-input-row">
        <textarea class="chat-textarea" id="chatInp" rows="1" placeholder="说点什么…" onkeydown="onKey(event)"></textarea>
        <button class="chat-send" onclick="sendText()">➤</button>
      </div>
    </div>
  </div>

  <!-- 未登录覆盖 -->
  <div class="login-overlay" id="loginOverlay">
    <p>请先登录后留言</p>
    <button class="btn-back" onclick="goHome()">返回主页登录</button>
  </div>

  <!-- 大图 -->
  <div class="img-overlay" id="imgOverlay" onclick="this.classList.remove('show')">
    <img src="" id="imgOverlayImg" alt="">
  </div>

  <!-- 新私信弹窗 -->
  <div class="new-chat-overlay" id="newChatOverlay" onclick="closeNewChat()">
    <div class="new-chat-box" onclick="event.stopPropagation()">
      <h4>新私信</h4>
      <input type="text" id="newChatInput" placeholder="输入对方用户名" onkeydown="if(event.key==='Enter'){event.preventDefault();confirmNewChat();}">
      <div class="new-chat-error" id="newChatError"></div>
      <div class="new-chat-btns">
        <button class="new-chat-btn" onclick="closeNewChat()">取消</button>
        <button class="new-chat-btn primary" onclick="confirmNewChat()">确定</button>
      </div>
    </div>
  </div>

  <script>
    // ========== 基础请求 ==========
    const API = '';
    async function req(method, url, body) {
      const opts = { method, credentials: 'include' };
      if (body) {
        if (body instanceof FormData) { opts.body = body; }
        else { opts.headers = { 'Content-Type': 'application/json' }; opts.body = JSON.stringify(body); }
      }
      const r = await fetch(API + url, opts);
      if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.error || '请求失败'); }
      return r.json();
    }
    const get  = (url) => req('GET', url);
    const post = (url, body) => req('POST', url, body);
    const put  = (url, body) => req('PUT', url, body);

    // ========== 状态 ==========
    let myId = null, otherId = null, isAdmin = false, otherName = '霁光';
    let msgs = [], pollTimer = null;

    // ========== 启动 ==========
    async function boot() {
      try {
        const me = await get('/api/me');
        if (!me || !me.id) { showLogin(); return; }
        myId = me.id; isAdmin = !!me.is_admin;
        hideLogin();

        const qs = new URLSearchParams(location.search);
        const withId = qs.get('with');
        const backParam = qs.get('back');

        // 返回地址：优先使用 back 参数，持久化到 sessionStorage
        let backUrl = '/';
        if (backParam === 'profile') backUrl = '/profile.html';
        else if (isAdmin) backUrl = '/admin.html#chats';
        sessionStorage.setItem('chatBackUrl', backUrl);

        if (withId) {
          // 聊天模式
          otherId = parseInt(withId);
          await loadOtherInfo(otherId);
          showChatMode();
          // 立即加载历史消息（不能等轮询）
          loadMsgs();
          // 标记对方消息为已读
          markRead(otherId);
          pollTimer = setInterval(loadMsgs, 2000);
          // 显示"列表"按钮
          document.getElementById('listBtn').style.display = 'inline-block';
        } else {
          // 列表模式
          showSessionListMode();
          loadSessions();
          document.getElementById('listBtn').style.display = 'none';
          // 列表模式轮询更新会话列表（红点 + 预览）
          pollTimer = setInterval(loadSessions, 3000);
          // 列表模式下返回也指向 backUrl
          document.querySelector('.chat-head .back').href = backUrl;
        }
      } catch (e) {
        console.error('boot error:', e);
        showLogin();
      }
    }

    async function loadOtherInfo(userId) {
      try {
        const user = await get('/api/users/' + userId);
        otherName = user.username || ('用户 #' + userId);
      } catch(e) {
        otherName = '用户 #' + userId;
      }
      document.getElementById('chatTitle').textContent = otherName;
    }

    function showChatMode() {
      document.getElementById('sessionListView').style.display = 'none';
      document.getElementById('chatBody').style.display = 'block';
      document.getElementById('chatFoot').style.display = 'block';
    }

    function showSessionListMode() {
      document.getElementById('sessionListView').style.display = 'block';
      document.getElementById('chatBody').style.display = 'none';
      document.getElementById('chatFoot').style.display = 'none';
      document.getElementById('chatTitle').textContent = '私信';
    }

    function showSessionList() {
      // 停止聊天轮询
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
      // 清除 otherId，表示回到列表模式
      otherId = null;
      // 重写 URL，保留 back 参数
      const savedBack = sessionStorage.getItem('chatBackUrl');
      const backQs = savedBack === '/profile.html' ? '?back=profile' : '';
      history.replaceState(null, '', '/chat.html' + backQs);
      showSessionListMode();
      loadSessions();
      // 启动列表轮询
      pollTimer = setInterval(loadSessions, 3000);
    }

    function goBack() {
      // 如果在聊天模式，返回私信列表
      if (otherId) {
        showSessionList();
        return false; // 阻止默认跳转
      }
      // 如果在列表模式，返回保存的上一页（个人中心或首页）
      const savedBack = sessionStorage.getItem('chatBackUrl') || '/';
      location.href = savedBack;
      return false;
    }

    async function loadSessions() {
      const body = document.getElementById('sessionListBody');
      try {
        const sessions = await get('/api/chat-sessions');
        if (!sessions || sessions.length === 0) {
          body.innerHTML = '<div class="session-empty">暂无会话<br>点击上方「新私信」开始聊天</div>';
          return;
        }
        body.innerHTML = sessions.map(s => {
          // API 返回字段: content, type, created_at
          const timeStr = s.created_at ? new Date(s.created_at + 'Z').toLocaleDateString('zh-CN', { month: 'numeric', day: 'numeric' }) : '';
          let preview = '暂无消息';
          if (s.type === 'image') preview = '[图片]';
          else if (s.type === 'video') preview = '[视频]';
          else if (s.content && s.content.trim()) preview = escape(s.content.substring(0, 30));
          else if (s.type) preview = '[消息]';
          
          // 计算未读数（API未返回，前端本地计算：该会话对方发的消息且未读）
          const unreadCount = s.unread_count || 0;
          const isUnread = unreadCount > 0;
          const unreadHtml = isUnread 
            ? `<span class="session-avatar-badge show"><span class="session-avatar-arc"></span><span class="session-avatar-dot">${unreadCount > 99 ? '99+' : unreadCount}</span></span>`
            : '<span class="session-avatar-badge"><span class="session-avatar-arc"></span><span class="session-avatar-dot"></span></span>';
          const previewClass = isUnread ? 'session-preview unread' : 'session-preview';
          const cardClass = isUnread ? 'session-card has-unread' : 'session-card';
          return `
            <div class="${cardClass}" onclick="openChatWith(${s.other_id})">
              <div class="session-avatar">
                ${escape(s.username ? s.username[0] : '?')}
                ${unreadHtml}
              </div>
              <div class="session-info">
                <div class="session-name">${escape(s.username || '未知用户')}</div>
                <div class="${previewClass}">${preview}</div>
              </div>
              <div class="session-time">${timeStr}</div>
            </div>
          `;
        }).join('');
      } catch(e) {
        body.innerHTML = '<div class="session-empty">加载失败</div>';
      }
    }

    async function markRead(otherId) {
      try {
        await post('/api/messages/read', { other_id: otherId });
      } catch(e) { /* ignore */ }
    }

    function openChatWith(userId) {
      // 停止列表轮询
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
      // 切换 URL
      const savedBack = sessionStorage.getItem('chatBackUrl');
      const backQs = savedBack === '/profile.html' ? '?back=profile' : '';
      history.replaceState(null, '', '/chat.html?with=' + userId + backQs);
      // 立即切换模式并加载
      otherId = parseInt(userId);
      loadOtherInfo(otherId).then(() => {
        showChatMode();
        loadMsgs();
        markRead(otherId);
        pollTimer = setInterval(loadMsgs, 2000);
        document.getElementById('listBtn').style.display = 'inline-block';
        const backEl = document.querySelector('.chat-head .back');
        if (backEl) backEl.href = savedBack || '/';
      });
    }

    async function startNewChat() {
      document.getElementById('newChatInput').value = '';
      document.getElementById('newChatError').textContent = '';
      document.getElementById('newChatOverlay').classList.add('active');
      setTimeout(() => document.getElementById('newChatInput').focus(), 100);
    }

    function closeNewChat() {
      document.getElementById('newChatOverlay').classList.remove('active');
      document.getElementById('newChatError').textContent = '';
    }

    async function confirmNewChat() {
      const username = document.getElementById('newChatInput').value.trim();
      const errEl = document.getElementById('newChatError');
      if (!username) {
        errEl.textContent = '请输入用户名';
        return;
      }
      try {
        const users = await get('/api/users');
        const user = (users || []).find(u => u.username === username);
        if (!user) {
          errEl.textContent = '未找到用户：' + username;
          return;
        }
        if (user.id === myId) {
          errEl.textContent = '不能给自己发私信';
          return;
        }
        closeNewChat();
        openChatWith(user.id);
      } catch(e) {
        errEl.textContent = '查找用户失败';
      }
    }

    function showLogin() {
      document.getElementById('loginOverlay').classList.add('show');
      document.getElementById('chatFoot').style.display = 'none';
    }
    function hideLogin() {
      document.getElementById('loginOverlay').classList.remove('show');
      document.getElementById('chatFoot').style.display = 'block';
    }
    function goHome() {
      sessionStorage.setItem('openLoginModal', '1');
      location.href = '/';
    }

    // ========== 加载消息 ==========
    async function loadMsgs() {
      if (!otherId) return;
      try {
        msgs = await get('/api/messages?with=' + otherId);
        // 自动标记对方消息为已读（is_read 是整数 0/1）
        const hasUnreadFromOther = msgs.some(m => m.sender_id === otherId && m.is_read === 0);
        if (hasUnreadFromOther) markRead(otherId);
        render();
      } catch(e) { console.error('loadMsgs', e); }
    }

    // ========== 渲染 ==========
    function render() {
      const box = document.getElementById('chatBody');
      if (!msgs.length) { box.innerHTML = '<div class="chat-empty">暂无消息，发送第一条留言吧</div>'; return; }

      let lastDate = '';
      box.innerHTML = msgs.map((m, i) => {
        const self = m.sender_id === myId;
        // SQLite 存储 UTC 时间，前端需要转换为本地时间显示
        const d = new Date(m.created_at + 'Z');
        const t = `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
        const ds = `${d.getMonth()+1}月${d.getDate()}日`;
        let label = '';
        if (ds !== lastDate) { lastDate = ds; label = `<div class="chat-date">${ds}</div>`; }

        let inner = '';
        if (m.is_withdrawn) {
          inner = '<span style="opacity:0.5;font-style:italic;">消息已撤回</span>';
        } else if (m.type === 'image' && m.file_url) {
          inner = `<img src="${m.file_url}" class="msg-img" onclick="viewImg('${m.file_url}')">`;
        } else if (m.type === 'video' && m.file_url) {
          inner = `<video src="${m.file_url}" class="msg-video" controls playsinline></video>`;
        } else {
          inner = escape(m.content || '');
        }

        // 撤回按钮（仅自己的消息且2分钟内）
        let withdrawBtn = '';
        if (self && !m.is_withdrawn && canWithdraw(m.created_at)) {
          withdrawBtn = `<button class="msg-withdraw-btn" onclick="withdraw(${m.id}, event)">撤回</button>`;
        }

        return label + `
          <div class="msg-row ${self ? 'self' : 'other'}">
            <div class="msg-time">${t}</div>
            <div class="msg-bubble ${m.is_withdrawn ? 'withdrawn' : ''}">
              ${inner}${withdrawBtn}
            </div>
          </div>`;
      }).join('');

      box.scrollTop = box.scrollHeight;
    }

    function canWithdraw(iso) {
      return (new Date() - new Date(iso + 'Z')) < 2 * 60 * 1000;
    }
    function escape(s) {
      const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
    }

    // ========== 发送 ==========
    async function sendText() {
      const el = document.getElementById('chatInp');
      const txt = el.value.trim();
      if (!txt || !otherId) return;
      el.value = '';
      try {
        await post('/api/messages', { receiver_id: otherId, content: txt, type: 'text' });
        loadMsgs();
      } catch(e) { alert(e.message || '发送失败'); }
    }
    function onKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
    }

    async function sendFile(input, type) {
      const file = input.files[0]; if (!file || !otherId) return;
      const fd = new FormData();
      fd.append('file', file);
      fd.append('receiver_id', otherId);
      fd.append('type', type);
      try {
        await post('/api/messages/upload', fd);
        input.value = '';
        loadMsgs();
      } catch(e) { alert(e.message || '发送失败'); }
    }

    // ========== 撤回 ==========
    async function withdraw(id, ev) {
      ev.stopPropagation();
      if (!confirm('撤回这条消息？')) return;
      try {
        await put('/api/messages/' + id + '/withdraw', {});
        loadMsgs();
      } catch(e) { alert(e.message || '撤回失败'); }
    }

    // ========== 大图 ==========
    function viewImg(url) {
      document.getElementById('imgOverlayImg').src = url;
      document.getElementById('imgOverlay').classList.add('show');
    }

    // 启动
    boot();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>哲学家分类索引 · 霁光</title>
  <link rel="stylesheet" href="/style.css?v=2">
  <style>
    .cat-page {
      background: var(--bg-primary);
      min-height: 100vh;
      padding-top: 56px;
    }

    .cat-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 32px;
    }

    .cat-header {
      text-align: center;
      margin-bottom: 40px;
    }
    .cat-header h1 {
      font-family: var(--font-serif);
      font-size: 26px;
      color: var(--accent-gold);
      letter-spacing: 6px;
      margin-bottom: 10px;
    }
    .cat-header p {
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 2px;
    }

    /* ===== 搜索栏 ===== */
    .search-bar {
      max-width: 500px;
      margin: 0 auto 36px;
      position: relative;
    }
    .search-bar input {
      width: 100%;
      padding: 12px 44px 12px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      letter-spacing: 1px;
      outline: none;
      transition: border-color 0.3s;
    }
    .search-bar input:focus {
      border-color: rgba(201,169,110,0.4);
    }
    .search-bar input::placeholder { color: var(--text-muted); }
    .search-bar .search-icon {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: var(--text-muted);
    }

    /* ===== 分类标签导航 ===== */
    .cat-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .cat-tab {
      padding: 8px 18px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s;
      letter-spacing: 1px;
    }
    .cat-tab:hover {
      border-color: rgba(201,169,110,0.3);
      color: var(--text-secondary);
    }
    .cat-tab.active {
      border-color: var(--accent-gold);
      color: var(--accent-gold);
      background: rgba(201,169,110,0.08);
    }

    /* ===== 时代/学派分组 ===== */
    .cat-section {
      margin-bottom: 44px;
    }
    .cat-section-title {
      font-family: var(--font-serif);
      font-size: 16px;
      color: var(--accent-gold);
      letter-spacing: 3px;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .cat-section-title .cat-badge {
      font-size: 11px;
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 2px 10px;
      border-radius: 4px;
      letter-spacing: 1px;
    }
    .cat-section-title .cat-count {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ===== 哲学家卡片网格 ===== */
    .cat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .cat-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .cat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .cat-card:hover {
      border-color: rgba(201,169,110,0.25);
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
    .cat-card:hover::before {
      opacity: 0.6;
    }

    .cat-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .cat-card-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      background: rgba(201,169,110,0.06);
      border: 1px solid rgba(201,169,110,0.15);
      flex-shrink: 0;
    }
    .cat-card-title {
      flex: 1;
      min-width: 0;
    }
    .cat-card-name {
      font-family: var(--font-serif);
      font-size: 15px;
      color: var(--text-primary);
      letter-spacing: 2px;
      margin-bottom: 2px;
    }
    .cat-card-en {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .cat-card-desc {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .cat-card-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: auto;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .cat-card-tag {
      font-size: 10px;
      color: var(--accent-gold);
      border: 1px solid rgba(201,169,110,0.15);
      padding: 2px 8px;
      border-radius: 8px;
      background: rgba(201,169,110,0.04);
    }

    /* 地域标识 */
    .region-mark {
      position: absolute;
      top: 12px; right: 12px;
      font-size: 9px;
      padding: 2px 7px;
      border-radius: 3px;
      letter-spacing: 1px;
    }
    .region-mark.west {
      color: var(--accent-warm);
      border: 1px solid rgba(212,165,116,0.2);
      background: rgba(212,165,116,0.04);
    }
    .region-mark.east {
      color: #7fb3d5;
      border: 1px solid rgba(127,179,213,0.2);
      background: rgba(127,179,213,0.04);
    }

    /* 隐藏分组 */
    .cat-section.hidden { display: none; }
    .cat-card.hidden { display: none; }

    /* 回到选择页入口 */
    .back-to-select {
      text-align: center;
      margin-top: 40px;
      padding-top: 30px;
      border-top: 1px solid var(--border);
    }
    .back-to-select a {
      color: var(--accent-gold);
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 2px;
      padding: 10px 28px;
      border: 1px solid rgba(201,169,110,0.3);
      border-radius: 6px;
      transition: all 0.3s;
      display: inline-block;
    }
    .back-to-select a:hover {
      background: rgba(201,169,110,0.1);
      border-color: var(--accent-gold);
    }

    @media (max-width: 768px) {
      .cat-container { padding: 24px 16px; }
      .cat-grid { grid-template-columns: 1fr; }
      .cat-header h1 { font-size: 22px; }
      .cat-tabs { gap: 6px; }
      .cat-tab { padding: 6px 12px; font-size: 12px; }
    }
  </style>
</head>
<body class="cat-page">

  <nav class="top-nav">
    <div style="display:flex;align-items:center;gap:16px;">
      <a class="top-nav-brand" href="/index.html" style="text-decoration:none;color:var(--accent-gold);">霁光</a>
      <span style="font-size:12px;color:var(--text-muted);letter-spacing:2px;">哲学家分类索引</span>

  <div class="cat-container">

    <div class="cat-tabs" id="catTabs">

      <button class="cat-tab" onclick="filterCategory('pragmatism')">实用主义 · 2</button>

    <div class="cat-section" data-category="modern">

      <div class="cat-grid" id="modernGrid"></div>

    <div class="cat-section" data-category="german">

    <div class="cat-section" data-category="nineteenth">

        十九世纪哲学

      <div class="cat-grid" id="nineteenthGrid"></div>

    <!-- 分析哲学 -->
    <div class="cat-section" data-category="analytic">
      <div class="cat-section-title">
        分析哲学
        <span class="cat-badge">罗素 → 维特根斯坦 → 蒯因</span>

      <div class="cat-grid" id="analyticGrid"></div>

    <!-- 欧陆哲学 -->
    <div class="cat-section" data-category="continental">
      <div class="cat-section-title">
        欧陆哲学
        <span class="cat-badge">现象学 · 存在主义 · 后现代 · 批判理论</span>
        <span class="cat-count">9 位</span>
      </div>
      <div class="cat-grid" id="continentalGrid"></div>
    </div>

    <!-- 实用主义 -->
    <div class="cat-section" data-category="pragmatism">

    function renderAll() {
      for (const [category, list] of Object.entries(PHILOSOPHERS)) {
        const grid = document.getElementById(category + 'Grid');
        if (!grid) continue;
        grid.innerHTML = list.map(p => renderCard(p)).join('');
      }
    }

    function renderCard(p) {
      const regionClass = p.region === 'east' ? 'east' : 'west';
      const regionText = p.region === 'east' ? '东方' : '西方';
      return `
        <div class="cat-card" onclick="enterChat('${p.id}')" data-name="${p.name} ${p.nameEn} ${p.tags.join(' ')}">
          <span class="region-mark ${regionClass}">${regionText}</span>
          <div class="cat-card-header">
            <div class="cat-card-avatar">${p.avatar}</div>
            <div class="cat-card-title">
              <div class="cat-card-name">${p.name}</div>
              <div class="cat-card-en">${p.nameEn} · ${p.years}</div>
            </div>
          </div>
          <div class="cat-card-desc">${p.desc}</div>
          <div class="cat-card-meta">
            ${p.tags.map(t => `<span class="cat-card-tag">${t}</span>`).join('')}
          </div>
        </div>
      `;
    }

    function filterCategory(cat) {
      // 更新标签状态
      document.querySelectorAll('.cat-tab').forEach(tab => tab.classList.remove('active'));
      event.target.classList.add('active');

      // 显示/隐藏分组
      document.querySelectorAll('.cat-section').forEach(sec => {
        if (cat === 'all' || sec.dataset.category === cat) {
          sec.classList.remove('hidden');
        } else {
          sec.classList.add('hidden');
        }
      });

      // 清除搜索
      document.getElementById('searchInput').value = '';
    }

    function doSearch() {
      const q = document.getElementById('searchInput').value.toLowerCase().trim();

      if (!q) {
        // 恢复全部显示
        document.querySelectorAll('.cat-section').forEach(sec => sec.classList.remove('hidden'));
        document.querySelectorAll('.cat-card').forEach(card => card.classList.remove('hidden'));
        return;
      }

      // 搜索模式：显示所有分组，只隐藏不匹配卡片
      document.querySelectorAll('.cat-section').forEach(sec => sec.classList.remove('hidden'));
      document.querySelectorAll('.cat-card').forEach(card => {
        const text = card.dataset.name.toLowerCase();
        if (text.includes(q)) {
          card.classList.remove('hidden');
        } else {
          card.classList.add('hidden');
        }
      });

      // 隐藏空分组
      document.querySelectorAll('.cat-section').forEach(sec => {
        const visible = sec.querySelectorAll('.cat-card:not(.hidden)');
        if (visible.length === 0) sec.classList.add('hidden');
      });

      // 清除标签高亮
      document.querySelectorAll('.cat-tab').forEach(tab => tab.classList.remove('active'));
    }

    function enterChat(id) {
      window.location.href = '/philosopher.html?id=' + encodeURIComponent(id);
    }

    // 导航栏用户状态
    async function initNav() {
      try {
        const res = await fetch('/api/profile');
        const data = await res.json();
        if (data.success && data.user) {
          document.getElementById('navUserName').textContent = data.user.nickname || data.user.username;
          document.getElementById('navUserName').style.display = '';
          document.getElementById('navProfileBtn').style.display = '';
          document.getElementById('navLoginBtn').style.display = 'none';
          document.getElementById('navLogoutBtn').style.display = '';
        }
      } catch {}
    }

    function logout() {
      fetch('/api/logout', { method: 'POST' }).then(() => window.location.reload());
    }

    renderAll();
    initNav();
  </script>

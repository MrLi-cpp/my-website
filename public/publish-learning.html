<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上传学习资料 - 霁光</title>
  <link rel="stylesheet" href="/style.css?v=2">
  <style>
    html, body { overflow-y: auto !important; height: auto !important; min-height: 100vh; }
    .publish-page {
      min-height: 100vh;
      padding: 80px 20px 60px;
      max-width: 720px;
      margin: 0 auto;
    }
    .publish-header {
      text-align: center;
      margin-bottom: 40px;
      padding-top: 20px;
    }
    .publish-header h1 {
      font-family: var(--font-serif);
      font-size: 32px;
      letter-spacing: 8px;
      font-weight: 400;
      color: var(--text-primary);
    }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      border-radius: 0;
      padding: 12px 4px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: var(--font-sans);
      outline: none;
      transition: border-color 0.3s;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      border-bottom-color: var(--accent-gold);
    }
    .form-group input[type="file"] {
      border-bottom: none;
      padding: 10px 0;
      cursor: pointer;
    }
    .form-group input[type="file"]::-webkit-file-upload-button {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 4px;
      color: var(--text-muted);
      padding: 6px 12px;
      cursor: pointer;
      margin-right: 12px;
      font-family: var(--font-sans);
    }
    .form-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      position: sticky;
      bottom: 20px;
      padding: 16px 0;
      background: linear-gradient(to top, var(--bg-primary) 60%, transparent);
    }
    .btn-primary {
      background: var(--accent-gold);
      border: none;
      border-radius: 8px;
      padding: 12px 32px;
      color: var(--bg-primary);
      font-size: 14px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: opacity 0.2s;
      font-family: var(--font-sans);
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 24px;
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
      letter-spacing: 1px;
      font-family: var(--font-sans);
      transition: all 0.3s;
    }
    .btn-secondary:hover {
      border-color: var(--accent-gold);
      color: var(--accent-gold);
    }
    .success-msg {
      background: rgba(7,193,96,0.1);
      color: #07c160;
      padding: 12px 16px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 13px;
      display: none;
      text-align: center;
      letter-spacing: 1px;
    }
    .cover-preview {
      max-width: 200px;
      border-radius: 8px;
      margin-top: 8px;
      border: 1px solid var(--border);
      display: none;
    }
    .cover-preview.show { display: block; }
    .required-note { color: var(--accent-red); font-size: 11px; margin-left: 4px; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(201,169,110,0.2); border-radius: 3px; }
  </style>
</head>
<body>

  <a href="/publish-choice.html" class="btn-back">返回</a>

  <div class="publish-page">
    <div class="publish-header">
      <h1>上传学习资料</h1>
    </div>

    <div class="success-msg" id="successMsg">上传成功！</div>

    <form id="learningForm">
      <div class="form-group">
        <label>标题 <span class="required-note">*</span></label>
        <input type="text" id="learnTitle" placeholder="资料标题" required>
      </div>
      <div class="form-group">
        <label>日期 <span class="required-note">*</span></label>
        <input type="datetime-local" id="learnDate" required>
      </div>
      <div class="form-group">
        <label>封面图（可选）</label>
        <input type="file" id="learnCover" accept="image/*">
        <img id="coverPreview" class="cover-preview" alt="封面预览">
      </div>
      <div class="form-group">
        <label>HTML 文件 <span class="required-note">* 必需</span></label>
        <input type="file" id="learnHtml" accept=".html,.htm" required>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn-primary">上传资料</button>
        <button type="button" class="btn-secondary" onclick="resetForm()">重置</button>
      </div>
    </form>
  </div>

  <script src="/script.js?v=2"></script>
  <script>
    const now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    document.getElementById('learnDate').value = now.toISOString().slice(0, 16);

    // 封面预览
    document.getElementById('learnCover').onchange = function() {
      const file = this.files[0];
      const preview = document.getElementById('coverPreview');
      if (file) {
        preview.src = URL.createObjectURL(file);
        preview.classList.add('show');
      } else {
        preview.classList.remove('show');
      }
    };

    document.getElementById('learningForm').onsubmit = async e => {
      e.preventDefault();
      const title = document.getElementById('learnTitle').value.trim();
      const date = document.getElementById('learnDate').value;
      const cover = document.getElementById('learnCover').files[0];
      const htmlFile = document.getElementById('learnHtml').files[0];
      if (!title || !date || !htmlFile) {
        alert('请填写标题、日期并上传 HTML 文件');
        return;
      }
      const data = new FormData();
      data.append('title', title);
      data.append('display_date', date);
      if (cover) data.append('cover', cover);
      data.append('html', htmlFile);
      try {
        const res = await fetch('/api/learning', { method: 'POST', body: data, credentials: 'same-origin' });
        const json = await res.json();
        if (!res.ok) throw new Error(json.error || '上传失败');
        showSuccess();
        resetForm();
      } catch(err) {
        alert(err.message);
      }
    };

    function resetForm() {
      document.getElementById('learningForm').reset();
      const n = new Date();
      n.setMinutes(n.getMinutes() - n.getTimezoneOffset());
      document.getElementById('learnDate').value = n.toISOString().slice(0, 16);
      document.getElementById('coverPreview').classList.remove('show');
    }

    function showSuccess() {
      const msg = document.getElementById('successMsg');
      msg.style.display = 'block';
      setTimeout(() => msg.style.display = 'none', 3000);
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>哲学家对话 · 霁光</title>
  <link rel="stylesheet" href="/style.css?v=2">
  <style>
    /* ===== 哲学家页面专用样式 ===== */
    .philo-page {
      background: var(--bg-primary);
      min-height: 100vh;
      padding-top: 56px;
    }

    .philo-container {
      display: flex;
      height: calc(100vh - 56px);
      max-width: 1400px;
      margin: 0 auto;
    }

    /* 侧边栏 */
    .philo-sidebar {
      width: 280px;
      flex-shrink: 0;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 20px;
      overflow-y: auto;
    }

    .philo-sidebar-avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      background: rgba(201,169,110,0.08);
      border: 1px solid var(--border-gold);
      margin-bottom: 16px;
    }

    .philo-sidebar-name {
      font-family: var(--font-serif);
      font-size: 18px; color: var(--text-primary);
      letter-spacing: 2px; margin-bottom: 4px;
    }

    .philo-sidebar-en {
      font-size: 11px; color: var(--text-muted);
      letter-spacing: 3px; text-transform: uppercase;
      margin-bottom: 20px;
    }

    .philo-sidebar-divider {
      width: 40px; height: 1px;
      background: var(--border-gold);
      margin: 16px 0;
    }

    .philo-sidebar-desc {
      font-size: 12px; color: var(--text-secondary);
      line-height: 1.8; text-align: center;
    }

    .philo-sidebar-tags {
      display: flex; flex-wrap: wrap; gap: 6px;
      justify-content: center; margin-top: 12px;
    }
    .philo-sidebar-tags span {
      font-size: 11px; color: var(--accent-gold);
      border: 1px solid rgba(201,169,110,0.2);
      padding: 3px 10px; border-radius: 12px;
      background: rgba(201,169,110,0.04);
    }

    .philo-sidebar-actions {
      margin-top: auto;
      width: 100%;
      display: flex; flex-direction: column; gap: 8px;
    }

    .philo-sidebar-btn {
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 12px; letter-spacing: 1px;
      cursor: pointer; transition: all 0.3s;
      text-align: center;
    }
    .philo-sidebar-btn:hover {
      border-color: var(--border-gold);
      color: var(--accent-gold);
      background: rgba(201,169,110,0.05);
    }
    .philo-sidebar-btn.danger {
      border-color: rgba(192,57,43,0.3);
      color: rgba(192,57,43,0.8);
    }
    .philo-sidebar-btn.danger:hover {
      border-color: var(--accent-red);
      color: var(--accent-red);
      background: rgba(192,57,43,0.05);
    }

    /* 哲学家切换 */
    .philo-switcher {
      display: flex; gap: 8px; margin-bottom: 20px;
      width: 100%; justify-content: center;
    }
    .philo-switch-btn {
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: transparent;
      color: var(--text-muted);
      font-size: 12px; cursor: pointer;
      transition: all 0.3s;
    }
    .philo-switch-btn.active {
      border-color: var(--accent-gold);
      color: var(--accent-gold);
      background: rgba(201,169,110,0.08);
    }
    .philo-switch-btn:hover:not(.active) {
      border-color: rgba(201,169,110,0.3);
      color: var(--text-secondary);
    }

    /* 主聊天区 */
    .philo-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .philo-header {
      height: 56px;
      display: flex; align-items: center;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(12,12,14,0.6);
      backdrop-filter: blur(8px);
    }
    .philo-header-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #27ae60;
      margin-right: 10px;
      box-shadow: 0 0 6px rgba(39,174,96,0.4);
    }
    .philo-header-title {
      font-size: 14px; color: var(--text-primary);
      letter-spacing: 1px;
    }
    .philo-header-model {
      margin-left: auto;
      font-size: 11px; color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 3px 10px; border-radius: 4px;
    }

    .philo-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
      display: flex; flex-direction: column; gap: 20px;
    }

    .philo-msg {
      display: flex; gap: 12px;
      max-width: 85%;
      animation: fadeInUp 0.35s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .philo-msg.user-msg { align-self: flex-end; flex-direction: row-reverse; }
    .philo-msg.system-msg { align-self: flex-start; }

    .philo-msg-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
    }
    .user-msg .philo-msg-avatar {
      background: rgba(201,169,110,0.1);
      border-color: rgba(201,169,110,0.2);
    }

    .philo-msg-content {
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 13px; line-height: 1.85;
      color: var(--text-primary);
      background: var(--bg-secondary);
      border: 1px solid var(--border);
    }
    .user-msg .philo-msg-content {
      background: rgba(201,169,110,0.06);
      border-color: rgba(201,169,110,0.15);
    }
    .philo-msg-content p { margin-bottom: 8px; }
    .philo-msg-content p:last-child { margin-bottom: 0; }
    .philo-msg-content strong { color: var(--accent-gold); font-weight: 500; }
    .philo-msg-content em { color: var(--accent-warm); font-style: italic; }
    .philo-msg-content code {
      background: rgba(255,255,255,0.06);
      padding: 2px 6px; border-radius: 3px;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 12px;
    }

    /* 概念标签 */
    .concept-badge {
      display: inline-block;
      font-size: 10px; padding: 2px 8px;
      border-radius: 10px; margin-right: 4px;
    }
    .concept-badge.mastered {
      background: rgba(39,174,96,0.1); color: #27ae60;
      border: 1px solid rgba(39,174,96,0.2);
    }
    .concept-badge.familiar {
      background: rgba(201,169,110,0.08); color: var(--accent-gold);
      border: 1px solid rgba(201,169,110,0.15);
    }

    /* 引用文本 */
    .philo-citations {
      margin-top: 10px;
      padding: 10px 14px;
      border-radius: 8px;
      background: rgba(255,255,255,0.02);
      border-left: 2px solid var(--accent-gold);
    }
    .philo-cite-label {
      font-size: 11px; color: var(--accent-gold);
      margin-bottom: 6px; letter-spacing: 1px;
    }
    .philo-cite-item {
      font-size: 11px; color: var(--text-muted);
      line-height: 1.6; margin-bottom: 4px;
    }
    .philo-cite-source {
      color: var(--accent-gold); opacity: 0.7;
      margin-right: 6px;
    }

    /* 输入区 */
    .philo-input-area {
      padding: 16px 32px 24px;
      border-top: 1px solid var(--border);
      background: rgba(12,12,14,0.6);
      backdrop-filter: blur(8px);
    }

    .philo-input-wrapper {
      display: flex; gap: 12px;
      align-items: flex-end;
    }

    .philo-input-wrapper textarea {
      flex: 1;
      min-height: 44px; max-height: 120px;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 13px; line-height: 1.6;
      resize: none; outline: none;
      font-family: var(--font-sans);
    }
    .philo-input-wrapper textarea:focus {
      border-color: var(--border-gold);
      box-shadow: 0 0 12px rgba(201,169,110,0.08);
    }
    .philo-input-wrapper textarea::placeholder {
      color: var(--text-muted);
    }

    .philo-send-btn {
      padding: 12px 24px;
      border: 1px solid var(--accent-gold);
      border-radius: 8px;
      background: var(--accent-gold);
      color: var(--bg-primary);
      font-size: 13px; letter-spacing: 2px;
      cursor: pointer; transition: all 0.3s;
      font-weight: 500;
    }
    .philo-send-btn:hover:not(:disabled) {
      background: #d4b87a;
      transform: scale(1.03);
      box-shadow: 0 0 16px rgba(201,169,110,0.2);
    }
    .philo-send-btn:disabled {
      opacity: 0.4; cursor: not-allowed;
    }

    .philo-input-hint {
      font-size: 11px; color: var(--text-muted);
      margin-top: 8px; padding-left: 4px;
    }

    /* 打字指示器 */
    .typing-indicator {
      display: flex; gap: 4px; align-items: center;
      padding: 12px 0;
    }
    .typing-indicator span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: typingBounce 1.4s ease-in-out infinite;
    }
    .typing-indicator span:nth-child(1) { animation-delay: 0s; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* 移动端适配 */
    @media (max-width: 768px) {
      .philo-sidebar { display: none; }
      .philo-messages { padding: 16px; }
      .philo-input-area { padding: 12px 16px 16px; }
    }
  </style>
</head>
<body class="philo-page">

  <!-- 顶部导航 -->
  <nav class="top-nav">
    <div style="display:flex;align-items:center;gap:16px;">
      <a class="top-nav-brand" href="/index.html" style="text-decoration:none;color:var(--accent-gold);">霁光</a>
      <span class="nav-philosopher-btn" style="opacity:1;border-color:var(--accent-gold);background:rgba(201,169,110,0.08);">哲学家对话Beta</span>
    </div>
    <div class="top-nav-login" id="topNavLogin">
      <span class="top-nav-user" id="navUserName" style="display:none;"></span>
      <a class="nav-profile-btn" href="/profile.html" id="navProfileBtn" style="display:none;">个人中心</a>
      <a class="nav-login-btn" href="/login.html" id="navLoginBtn">登录</a>
      <button class="nav-logout-btn" id="navLogoutBtn" style="display:none;" onclick="logout()">退出</button>
    </div>
  </nav>

  <!-- 登录弹窗（与主页统一） -->
  <div class="login-modal-overlay" id="loginModal" onclick="closeLoginModal(event)">
    <div class="login-modal" onclick="event.stopPropagation()">
      <span class="login-modal-close" onclick="hideLoginModal()">&times;</span>
      <h2 id="loginModalTitle">登录</h2>
      <p class="subtitle" id="loginModalSubtitle">欢迎回来</p>
      <p class="login-error" id="loginError"></p>
      <input type="text" class="login-modal-input" id="loginUsername" placeholder="用户名" autocomplete="username" inputmode="latin" autocapitalize="off" spellcheck="false">
      <input type="password" class="login-modal-input" id="loginPassword" placeholder="密码" autocomplete="current-password" inputmode="latin" autocapitalize="off" spellcheck="false">
      <button class="login-modal-btn" id="loginModalBtn" onclick="submitLogin()">登录</button>
      <p class="login-modal-toggle" id="loginToggle" onclick="toggleLoginMode()">还没有账号？注册</p>
    </div>
  </div>

  <!-- 主容器 -->
  <div class="philo-container" id="philoContainer" style="display:none;">
    <!-- 侧边栏 -->
    <aside class="philo-sidebar" id="philoSidebar">
      <!-- 标准返回按钮（返回选择页） -->
      <a class="unified-back" href="/philosopher-select.html" style="position:relative;top:auto;left:auto;margin-bottom:20px;">← 返回</a>

      <div class="philo-sidebar-avatar" id="sidebarAvatar">⚡</div>
      <div class="philo-sidebar-name" id="sidebarName">弗里德里希·尼采</div>
      <div class="philo-sidebar-en" id="sidebarEn">Friedrich Nietzsche · 1844–1900</div>
      <div class="philo-sidebar-divider"></div>
      <p class="philo-sidebar-desc" id="sidebarDesc">
        19世纪德国哲学家、语文学家。全部工作可归结为一件事：对西方价值体系进行系统性批判与重估。
      </p>
      <div class="philo-sidebar-tags" id="sidebarTags">
        <span>权力意志</span><span>超人</span><span>永恒轮回</span>
      </div>
      <div class="philo-sidebar-divider"></div>
      <div class="philo-sidebar-actions">
        <a class="philo-sidebar-btn" href="/philosopher-profile.html" style="text-decoration:none;display:block;">📋 哲学档案</a>
        <a class="philo-sidebar-btn" href="/philosopher-select.html" style="text-decoration:none;display:block;">🔄 切换哲学家</a>
        <button class="philo-sidebar-btn" onclick="clearSession()">清空对话</button>
        <button class="philo-sidebar-btn danger" onclick="resetAll()">完全重置</button>
      </div>
    </aside>

    <!-- 主区域 -->
    <main class="philo-main">
      <div class="philo-header">
        <span class="philo-header-dot"></span>
        <span class="philo-header-title" id="chatHeaderTitle">与尼采对话</span>
        <span class="philo-header-model">DeepSeek</span>
      </div>

      <div class="philo-messages" id="messages">
        <div class="philo-msg system-msg" id="welcomeMsg">
          <div class="philo-msg-avatar">⚡</div>
          <div class="philo-msg-content">
            <p>欢迎。我是弗里德里希·尼采。你可以问我关于生命、道德、宗教、艺术、权力……任何你真正关心的事。</p>
            <p style="margin-top:8px;opacity:0.6;">我不会给你安慰，但我会给你锋利。</p>
          </div>
        </div>
      </div>

      <div class="philo-input-area">
        <div class="philo-input-wrapper">
          <textarea id="messageInput" placeholder="你想和尼采聊什么？" rows="1"></textarea>
          <button id="sendBtn" class="philo-send-btn" onclick="sendMessage()">发送</button>
        </div>
        <div class="philo-input-hint">按 Enter 发送，Shift + Enter 换行</div>
      </div>
    </main>
  </div>

  <script src="/philosopher.js"></script>
  <script>
    let loginMode = 'login';

    // 弹窗控制
    function showLoginModal() {
      document.getElementById('loginModal').classList.add('active');
      document.getElementById('loginUsername').focus();
    }
    function hideLoginModal() {
      document.getElementById('loginModal').classList.remove('active');
      document.getElementById('loginError').style.display = 'none';
    }
    function closeLoginModal(e) {
      if (e.target === document.getElementById('loginModal')) hideLoginModal();
    }
    function toggleLoginMode() {
      loginMode = loginMode === 'login' ? 'register' : 'login';
      document.getElementById('loginModalTitle').textContent = loginMode === 'login' ? '登录' : '注册';
      document.getElementById('loginModalSubtitle').textContent = loginMode === 'login' ? '欢迎回来' : '创建新账号';
      document.getElementById('loginModalBtn').textContent = loginMode === 'login' ? '登录' : '注册';
      document.getElementById('loginToggle').textContent = loginMode === 'login' ? '还没有账号？注册' : '已有账号？登录';
      document.getElementById('loginError').style.display = 'none';
    }
    async function submitLogin() {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errorEl = document.getElementById('loginError');
      if (!username || !password) { errorEl.textContent = '请填写用户名和密码'; errorEl.style.display = 'block'; return; }
      try {
        const endpoint = loginMode === 'login' ? '/api/login' : '/api/register';
        const res = await fetch(endpoint, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username, password}) });
        const result = await res.json();
        if (!res.ok) throw new Error(result.error || (loginMode === 'login' ? '登录失败' : '注册失败'));
        hideLoginModal();
        updateNavUser(result);
        // 初始化哲学家对话
        document.getElementById('philoContainer').style.display = 'flex';
        if (window.initPhilosopherChat) window.initPhilosopherChat();
      } catch (err) {
        errorEl.textContent = err.message || (loginMode === 'login' ? '登录失败' : '注册失败');
        errorEl.style.display = 'block';
      }
    }
    function updateNavUser(user) {
      if (user && user.id) {
        document.getElementById('navUserName').textContent = user.username;
        document.getElementById('navUserName').style.display = 'inline';
        document.getElementById('navProfileBtn').style.display = 'inline-block';
        document.getElementById('navLoginBtn').style.display = 'none';
        document.getElementById('navLogoutBtn').style.display = 'inline-block';
      } else {
        document.getElementById('navUserName').style.display = 'none';
        document.getElementById('navProfileBtn').style.display = 'none';
        document.getElementById('navLoginBtn').style.display = 'inline-block';
        document.getElementById('navLogoutBtn').style.display = 'none';
      }
    }

    // 顶部导航登录按钮改为弹窗
    document.getElementById('navLoginBtn').onclick = function(e) {
      e.preventDefault();
      showLoginModal();
    };

    // 检查登录状态
    async function checkNavLogin() {
      try {
        const res = await fetch('/api/me');
        const user = await res.json();
        if (user && user.id) {
          updateNavUser(user);
          document.getElementById('philoContainer').style.display = 'flex';
          if (window.initPhilosopherChat) window.initPhilosopherChat();
        } else {
          // 未登录：显示弹窗
          showLoginModal();
        }
      } catch {
        showLoginModal();
      }
    }

    async function logout() {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/index.html';
    }

    // 按 Enter 提交登录
    document.getElementById('loginPassword').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') submitLogin();
    });

    checkNavLogin();
  </script>
</body>
</html>

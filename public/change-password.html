<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>修改密码 - 霁光</title>
  <link rel="stylesheet" href="/style.css?v=4">
  <style>
    html, body { overflow-y: auto !important; height: auto !important; min-height: 100vh; }

    /* ===== 和登录弹窗同款的 overlay ===== */
    .cp-overlay {
      position: fixed;
      inset: 0;
      z-index: 3000;
      background: rgba(12,12,14,0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== 和登录弹窗同款的 card ===== */
    .cp-card {
      width: 360px;
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 40px 36px;
      position: relative;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
      border: 1px solid var(--border);
    }

    .cp-title {
      font-family: var(--font-serif);
      font-size: 22px;
      color: var(--text-primary);
      letter-spacing: 4px;
      margin-bottom: 4px;
      text-align: center;
    }
    .cp-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 2px;
      margin-bottom: 28px;
      text-align: center;
    }

    /* ===== 输入框（和登录弹窗同款） ===== */
    .cp-field {
      position: relative;
      margin-bottom: 14px;
    }
    .cp-field label {
      display: block;
      font-size: 11px;
      color: var(--accent-gold);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .cp-input {
      width: 100%;
      padding: 12px 40px 12px 14px;   /* 右边留 40px 给小眼睛 */
      border: none;
      border-bottom: 1px solid var(--border);
      background: transparent;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: border-color 0.3s;
      font-family: var(--font-sans);
    }
    .cp-input:focus { border-bottom-color: var(--accent-gold); }
    .cp-input::placeholder { color: var(--text-muted); }

    /* ===== 小眼睛图标 ===== */
    .cp-eye {
      position: absolute;
      right: 10px;
      bottom: 10px;
      width: 24px;
      height: 24px;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.3s;
      user-select: none;
    }
    .cp-eye:hover { color: var(--accent-gold); }

    /* ===== 按钮（和登录弹窗同款） ===== */
    .cp-btn {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      background: var(--accent-gold);
      border: none;
      color: var(--bg-primary);
      font-size: 13px;
      letter-spacing: 4px;
      cursor: pointer;
      transition: background 0.3s;
      border-radius: 6px;
    }
    .cp-btn:hover { background: var(--accent-warm); }

    /* ===== 提示信息 ===== */
    .cp-error {
      color: var(--accent-red);
      font-size: 12px;
      text-align: center;
      margin-bottom: 12px;
      display: none;
      letter-spacing: 1px;
    }
    .cp-success {
      color: #07c160;
      font-size: 12px;
      text-align: center;
      margin-bottom: 12px;
      display: none;
      letter-spacing: 1px;
    }

    /* ===== 返回链接 ===== */
    .cp-back {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
      color: var(--text-muted);
      text-decoration: none;
      letter-spacing: 1px;
      transition: color 0.3s;
    }
    .cp-back:hover { color: var(--accent-gold); }

    @media (max-width: 480px) {
      .cp-card { width: 90%; max-width: 340px; padding: 32px 24px; }
    }
  </style>
</head>
<body>
  <a href="/profile.html" class="btn-back">返回</a>

  <div class="cp-overlay">
    <div class="cp-card">
      <h2 class="cp-title">修改密码</h2>
      <p class="cp-subtitle">验证原密码后设置新密码</p>

      <div class="cp-error" id="cpError"></div>
      <div class="cp-success" id="cpSuccess"></div>

      <!-- 原密码 -->
      <div class="cp-field">
        <label>原密码</label>
        <input type="password" class="cp-input" id="oldPassword" placeholder="请输入当前密码">
        <span class="cp-eye" id="eyeOld" onclick="toggleEye('oldPassword', 'eyeOld')">
          <!-- 闭眼（默认隐藏）-->
          <svg id="icon-old-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/><line x1="17" y1="17" x2="22" y2="22"/><line x1="22" y1="17" x2="17" y2="22"/></svg>
          <!-- 睁眼（默认隐藏）-->
          <svg id="icon-old-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </span>
      </div>

      <!-- 新密码 -->
      <div class="cp-field">
        <label>新密码</label>
        <input type="password" class="cp-input" id="newPassword" placeholder="至少4位">
        <span class="cp-eye" id="eyeNew" onclick="toggleEye('newPassword', 'eyeNew')">
          <svg id="icon-new-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/><line x1="17" y1="17" x2="22" y2="22"/><line x1="22" y1="17" x2="17" y2="22"/></svg>
          <svg id="icon-new-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </span>
      </div>

      <button class="cp-btn" id="cpBtn" onclick="submitChangePassword()">确认修改</button>
    </div>
  </div>

  <script>
    // ===== 切换密码显示/隐藏 =====
    function toggleEye(inputId, eyeContainerId) {
      const input = document.getElementById(inputId);
      const suffix = inputId === 'oldPassword' ? 'old' : 'new';
      const iconClosed = document.getElementById('icon-' + suffix + '-closed');
      const iconOpen = document.getElementById('icon-' + suffix + '-open');

      if (input.type === 'password') {
        input.type = 'text';           // 显示明文
        iconClosed.style.display = 'none';
        iconOpen.style.display = 'block';
      } else {
        input.type = 'password';       // 隐藏为 *
        iconClosed.style.display = 'block';
        iconOpen.style.display = 'none';
      }
    }

    // ===== 提交修改 =====
    async function submitChangePassword() {
      const oldPass = document.getElementById('oldPassword').value;
      const newPass = document.getElementById('newPassword').value;
      const errorEl = document.getElementById('cpError');
      const successEl = document.getElementById('cpSuccess');

      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      if (!oldPass || !newPass) {
        errorEl.textContent = '请填写原密码和新密码';
        errorEl.style.display = 'block';
        return;
      }
      if (newPass.length < 4) {
        errorEl.textContent = '新密码至少4位';
        errorEl.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/api/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ oldPassword: oldPass, newPassword: newPass })
        });
        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.error || '修改失败';
          errorEl.style.display = 'block';
          return;
        }

        successEl.textContent = '✅ 密码修改成功，3秒后返回个人中心';
        successEl.style.display = 'block';
        document.getElementById('cpBtn').disabled = true;

        setTimeout(() => {
          location.href = '/profile.html';
        }, 3000);
      } catch (err) {
        errorEl.textContent = '网络错误，请重试';
        errorEl.style.display = 'block';
      }
    }
  </script>
</body>
</html>

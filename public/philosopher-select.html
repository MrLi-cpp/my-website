<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>选择哲学家 · 霁光</title>
  <link rel="stylesheet" href="/style.css?v=2">
  <style>
    .select-page {
      background: var(--bg-primary);
      min-height: 100vh;
      padding-top: 56px;
    }

    .select-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 32px;
    }

    .select-header {
      text-align: center;
      margin-bottom: 48px;
    }
    .select-header h1 {
      font-family: var(--font-serif);
      font-size: 28px;
      color: var(--accent-gold);
      letter-spacing: 6px;
      margin-bottom: 12px;
    }
    .select-header p {
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 2px;
    }

    /* ===== 分类标签导航 ===== */
    .category-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .category-tab {
      padding: 8px 20px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s;
      letter-spacing: 1px;
    }
    .category-tab:hover {
      border-color: rgba(201,169,110,0.3);
      color: var(--text-secondary);
    }
    .category-tab.active {
      border-color: var(--accent-gold);
      color: var(--accent-gold);
      background: rgba(201,169,110,0.08);
    }

    /* ===== 时代/学派分组标题 ===== */
    .era-section {
      margin-bottom: 40px;
    }
    .era-title {
      font-family: var(--font-serif);
      font-size: 16px;
      color: var(--accent-gold);
      letter-spacing: 3px;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .era-title .era-badge {
      font-size: 11px;
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 2px 10px;
      border-radius: 4px;
      letter-spacing: 1px;
    }

    /* 哲学家卡片网格 */
    .philo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .philo-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.35s ease;
      position: relative;
      overflow: hidden;
    }
    .philo-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
      opacity: 0;
      transition: opacity 0.35s;
    }
    .philo-card:hover {
      border-color: rgba(201,169,110,0.25);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    }
    .philo-card:hover::before {
      opacity: 0.6;
    }

    .philo-card-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }
    .philo-card-avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      background: rgba(201,169,110,0.06);
      border: 1px solid rgba(201,169,110,0.15);
      flex-shrink: 0;
    }
    .philo-card-title {
      flex: 1;
      min-width: 0;
    }
    .philo-card-name {
      font-family: var(--font-serif);
      font-size: 17px;
      color: var(--text-primary);
      letter-spacing: 2px;
      margin-bottom: 3px;
    }
    .philo-card-en {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .philo-card-desc {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .philo-card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }
    .philo-card-tags span {
      font-size: 10px;
      color: var(--accent-gold);
      border: 1px solid rgba(201,169,110,0.15);
      padding: 3px 10px;
      border-radius: 10px;
      background: rgba(201,169,110,0.04);
    }

    .philo-card-action {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .philo-card-action-text {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 1px;
    }
    .philo-card-action-arrow {
      font-size: 13px;
      color: var(--accent-gold);
      transition: transform 0.3s;
    }
    .philo-card:hover .philo-card-action-arrow {
      transform: translateX(4px);
    }

    /* 地域标识 */
    .region-badge {
      position: absolute;
      top: 12px; right: 12px;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      letter-spacing: 1px;
    }
    .region-west {
      color: var(--accent-warm);
      border: 1px solid rgba(212,165,116,0.2);
      background: rgba(212,165,116,0.04);
    }
    .region-east {
      color: #7fb3d5;
      border: 1px solid rgba(127,179,213,0.2);
      background: rgba(127,179,213,0.04);
    }

    /* 隐藏分组 */
    .era-section.hidden {
      display: none;
    }

    @media (max-width: 768px) {
      .select-container { padding: 24px 16px; }
      .philo-grid { grid-template-columns: 1fr; }
      .select-header h1 { font-size: 22px; }
      .category-tabs { gap: 6px; }
      .category-tab { padding: 6px 14px; font-size: 12px; }
    }
  </style>
</head>
<body class="select-page">

  <!-- 顶部导航 -->
  <nav class="top-nav">
    <div style="display:flex;align-items:center;gap:16px;">
      <a class="top-nav-brand" href="/index.html" style="text-decoration:none;color:var(--accent-gold);">霁光</a>
      <span class="nav-philosopher-btn" style="opacity:1;border-color:var(--accent-gold);background:rgba(201,169,110,0.08);">选择哲学家</span>
    </div>
    <div class="top-nav-login" id="topNavLogin">
      <span class="top-nav-user" id="navUserName" style="display:none;"></span>
      <a class="nav-profile-btn" href="/profile.html" id="navProfileBtn" style="display:none;">个人中心</a>
      <a class="nav-login-btn" href="/login.html" id="navLoginBtn">登录</a>
      <button class="nav-logout-btn" id="navLogoutBtn" style="display:none;" onclick="logout()">退出</button>
    </div>
  </nav>

  <!-- 标准返回按钮 -->
  <a class="unified-back" href="/index.html">← 返回主页</a>

  <div class="select-container">
    <div class="select-header">
      <h1>选择你的对话者</h1>
      <p>跨越三千年的思想锋利 · 每一位哲学家都是一个世界</p>
    </div>

    <!-- 分类筛选 -->
    <div class="category-tabs" id="categoryTabs">
      <button class="category-tab active" data-filter="all" onclick="filterCategory('all')">全部</button>
      <button class="category-tab" data-filter="ancient" onclick="filterCategory('ancient')">古希腊</button>
      <button class="category-tab" data-filter="chinese" onclick="filterCategory('chinese')">中国哲学</button>
      <button class="category-tab" data-filter="modern" onclick="filterCategory('modern')">近代哲学</button>
      <button class="category-tab" data-filter="german" onclick="filterCategory('german')">德国古典</button>
      <button class="category-tab" data-filter="existential" onclick="filterCategory('existential')">存在主义</button>
      <button class="category-tab" data-filter="analytic" onclick="filterCategory('analytic')">分析哲学</button>
      <button class="category-tab" data-filter="continental" onclick="filterCategory('continental')">欧陆哲学</button>
    </div>

    <!-- 古希腊 -->
    <div class="era-section" data-category="ancient">
      <div class="era-title">
        古希腊哲学
        <span class="era-badge">前苏格拉底 → 希腊化</span>
      </div>
      <div class="philo-grid" id="ancientGrid"></div>
    </div>

    <!-- 中国哲学 -->
    <div class="era-section" data-category="chinese">
      <div class="era-title">
        中国哲学
        <span class="era-badge">先秦 → 宋明理学</span>
      </div>
      <div class="philo-grid" id="chineseGrid"></div>
    </div>

    <!-- 中世纪 -->
    <div class="era-section" data-category="medieval">
      <div class="era-title">
        中世纪哲学
        <span class="era-badge">教父哲学 → 经院哲学</span>
      </div>
      <div class="philo-grid" id="medievalGrid"></div>
    </div>

    <!-- 近代 -->
    <div class="era-section" data-category="modern">
      <div class="era-title">
        近代哲学
        <span class="era-badge">理性主义 vs 经验主义</span>
      </div>
      <div class="philo-grid" id="modernGrid"></div>
    </div>

    <!-- 德国古典 -->
    <div class="era-section" data-category="german">
      <div class="era-title">
        德国古典哲学 / 观念论
        <span class="era-badge">康德 → 黑格尔</span>
      </div>
      <div class="philo-grid" id="germanGrid"></div>
    </div>

    <!-- 19世纪 -->
    <div class="era-section" data-category="nineteenth">
      <div class="era-title">
        十九世纪哲学
        <span class="era-badge">叔本华 → 马克思 → 尼采</span>
      </div>
      <div class="philo-grid" id="nineteenthGrid"></div>
    </div>

    <!-- 20世纪分析 -->
    <div class="era-section" data-category="analytic">
      <div class="era-title">
        分析哲学
        <span class="era-badge">罗素 → 维特根斯坦</span>
      </div>
      <div class="philo-grid" id="analyticGrid"></div>
    </div>

    <!-- 20世纪欧陆 -->
    <div class="era-section" data-category="continental">
      <div class="era-title">
        欧陆哲学
        <span class="era-badge">现象学 · 后现代 · 批判理论</span>
      </div>
      <div class="philo-grid" id="continentalGrid"></div>
    </div>

    <!-- 实用主义 -->
    <div class="era-section" data-category="pragmatism">
      <div class="era-title">
        实用主义
        <span class="era-badge">皮尔士 → 杜威</span>
      </div>
      <div class="philo-grid" id="pragmatismGrid"></div>
    </div>
  </div>

  <script>

    // 渲染各分组
    function renderAll() {
      for (const [category, list] of Object.entries(PHILOSOPHERS)) {
        const grid = document.getElementById(category + 'Grid');
        if (!grid) continue;
        grid.innerHTML = list.map(p => renderCard(p)).join('');
      }
    }

    function renderCard(p) {
      const regionClass = p.region === 'east' ? 'region-east' : 'region-west';
      const regionText = p.region === 'east' ? '东方' : '西方';
      return `
        <div class="philo-card" onclick="enterChat('${p.id}')">
          <span class="region-badge ${regionClass}">${regionText}</span>
          <div class="philo-card-header">
            <div class="philo-card-avatar">${p.avatar}</div>
            <div class="philo-card-title">
              <div class="philo-card-name">${p.name}</div>
              <div class="philo-card-en">${p.nameEn} · ${p.years}</div>
            </div>
          </div>
          <div class="philo-card-desc">${p.desc}</div>
          <div class="philo-card-tags">
            ${p.tags.map(t => `<span>${t}</span>`).join('')}
          </div>
          <div class="philo-card-action">
            <span class="philo-card-action-text">开始对话</span>
            <span class="philo-card-action-arrow">→</span>
          </div>
        </div>
      `;
    }

    function enterChat(id) {
      window.location.href = `/philosopher.html?id=${id}`;
    }

    // 分类筛选
    function filterCategory(category) {
      // 更新标签状态
      document.querySelectorAll('.category-tab').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.filter === category);
      });

      // 显示/隐藏分组
      document.querySelectorAll('.era-section').forEach(section => {
        if (category === 'all') {
          section.classList.remove('hidden');
        } else {
          const sectionCat = section.dataset.category;
          // 映射：某些标签对应多个分类
          const show = matchesFilter(sectionCat, category);
          section.classList.toggle('hidden', !show);
        }
      });
    }

    function matchesFilter(sectionCat, filter) {
      if (sectionCat === filter) return true;
      // 跨分类映射
      const map = {
        'existential': ['nineteenth', 'continental'],
        'pragmatism': ['pragmatism'],
      };
      if (map[filter]) return map[filter].includes(sectionCat);
      return false;
    }

    // 顶部导航
    async function checkNavLogin() {
      try {
        const res = await fetch('/api/me');
        const user = await res.json();
        if (user && user.id) {
          document.getElementById('navUserName').textContent = user.username;
          document.getElementById('navUserName').style.display = 'inline';
          document.getElementById('navProfileBtn').style.display = 'inline-block';
          document.getElementById('navLoginBtn').style.display = 'none';
          document.getElementById('navLogoutBtn').style.display = 'inline-block';
        }
      } catch {}
    }
    async function logout() {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/index.html';
    }

    renderAll();
    checkNavLogin();
  </script>
</body>
</html>

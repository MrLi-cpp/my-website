<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>哲思圆桌 · 霁光</title>
  <link rel="stylesheet" href="/style.css?v=2">
  <style>
    /* ========== 页面总高度锁定，禁止整体滚动 ========== */
    .group-page {
      background: var(--bg-primary);
      height: calc(100vh - 56px);        /* 减去顶部固定导航 */
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ========== 顶部横栏：固定不透明 ========== */
    .group-header {
      height: 52px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-secondary);    /* 实色背景，不透明 */
      z-index: 20;
    }
    .group-header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .group-header-title-block {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .group-header-title {
      font-family: var(--font-serif);
      font-size: 16px;
      color: var(--text-primary);
      letter-spacing: 2px;
      line-height: 1.2;
    }
    .group-header-sub {
      font-size: 11px;
      color: var(--text-muted);
    }
    .group-header-online {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .group-header-online .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--success-green, #27ae60);
      box-shadow: 0 0 4px rgba(39,174,96,0.4);
    }
    /* 横栏内返回按钮 */
    .header-back {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--text-muted);
      font-size: 12px;
      letter-spacing: 1px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s;
      flex-shrink: 0;
    }
    .header-back:hover {
      border-color: rgba(201,169,110,0.3);
      color: var(--text-secondary);
    }

    /* ========== 主布局：左右分栏，各自滚动 ========== */
    .group-body {
      flex: 1;
      display: flex;
      min-height: 0;            /* flex子项必须设这个才能正确overflow */
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }

    /* ========== 左侧参与者面板 ========== */
    .group-sidebar {
      width: 240px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: var(--bg-secondary);
      display: flex;
      flex-direction: column;
      overflow-y: auto;         /* 独立滚动 */
    }
    .group-sidebar::-webkit-scrollbar { width: 4px; }
    .group-sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .group-sidebar-title {
      padding: 14px 16px 8px;
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      flex-shrink: 0;
    }
    .group-participant {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .group-participant:hover {
      background: rgba(201,169,110,0.04);
    }
    .group-participant.active {
      background: rgba(201,169,110,0.08);
      border-left: 2px solid var(--accent-gold);
    }
    .group-participant-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      background: rgba(201,169,110,0.06);
      border: 1px solid rgba(201,169,110,0.15);
      flex-shrink: 0;
    }
    .group-participant-info {
      flex: 1;
      min-width: 0;
    }
    .group-participant-name {
      font-size: 13px;
      color: var(--text-primary);
      margin-bottom: 2px;
    }
    .group-participant-status {
      font-size: 10px;
      color: var(--text-muted);
    }
    .group-participant-status.thinking {
      color: var(--accent-gold);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* ========== 主聊天区 ========== */
    .group-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: var(--bg-primary);
      overflow: hidden;       /* 内部子项各自滚动 */
    }

    /* 消息列表：唯一滚动区 */
    .group-messages {
      flex: 1;
      overflow-y: auto;       /* 独立滚动 */
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 0;
    }
    .group-messages::-webkit-scrollbar { width: 4px; }
    .group-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* 消息气泡 */
    .msg-row {
      display: flex;
      gap: 10px;
      max-width: 80%;
      animation: msgIn 0.3s ease;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg-row.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .msg-row.philosopher {
      align-self: flex-start;
    }

    .msg-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      background: rgba(201,169,110,0.06);
      border: 1px solid rgba(201,169,110,0.15);
      flex-shrink: 0;
      cursor: pointer;
    }
    .msg-avatar.user-avatar {
      background: rgba(201,169,110,0.12);
      border-color: rgba(201,169,110,0.25);
    }

    .msg-content-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .msg-sender {
      font-size: 11px;
      color: var(--text-muted);
      padding-left: 4px;
    }
    .msg-sender .time {
      margin-left: 8px;
      opacity: 0.7;
    }
    .msg-bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-primary);
      word-break: break-word;
      white-space: pre-wrap;
    }
    .msg-row.philosopher .msg-bubble {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }
    .msg-row.user .msg-bubble {
      background: rgba(201,169,110,0.1);
      border: 1px solid rgba(201,169,110,0.2);
      border-top-right-radius: 4px;
      color: var(--text-primary);
    }

    /* 思考中动画 */
    .msg-row.thinking {
      opacity: 0.7;
    }
    .thinking-dots {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
    }
    .thinking-dots span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent-gold);
      animation: dotBounce 1.2s ease-in-out infinite;
    }
    .thinking-dots span:nth-child(2) { animation-delay: 0.15s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes dotBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* 系统提示 */
    .msg-system {
      align-self: center;
      font-size: 11px;
      color: var(--text-muted);
      padding: 6px 16px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      border: 1px solid var(--border);
      max-width: 80%;
      text-align: center;
      line-height: 1.6;
    }

    /* ========== 输入区：固定在底部 ========== */
    .group-input-area {
      flex-shrink: 0;
      padding: 10px 20px 16px;
      border-top: 1px solid var(--border);
      background: var(--bg-secondary);
    }
    .group-input-wrap {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .group-input {
      flex: 1;
      min-height: 44px;
      max-height: 120px;
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      outline: none;
      transition: border-color 0.3s;
    }
    .group-input:focus {
      border-color: rgba(201,169,110,0.3);
    }
    .group-send-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1px solid var(--border-gold);
      background: transparent;
      color: var(--accent-gold);
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .group-send-btn:hover:not(:disabled) {
      background: rgba(201,169,110,0.1);
      box-shadow: 0 0 16px rgba(201,169,110,0.15);
    }
    .group-send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* 工具栏 */
    .group-tools {
      display: flex;
      gap: 12px;
      padding: 0 0 8px 4px;
    }
    .group-tool-btn {
      font-size: 11px;
      color: var(--text-muted);
      background: transparent;
      border: 1px solid var(--border);
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s;
      letter-spacing: 1px;
    }
    .group-tool-btn:hover {
      border-color: rgba(201,169,110,0.3);
      color: var(--text-secondary);
    }

    /* ========== 移动端适配 ========== */
    @media (max-width: 768px) {
      .group-sidebar {
        display: none;
      }
      .group-messages {
        padding: 12px 14px;
      }
      .msg-row {
        max-width: 90%;
      }
      .group-header {
        padding: 0 10px;
      }
      .header-back {
        padding: 4px 8px;
        font-size: 11px;
      }
      .group-header-title {
        font-size: 14px;
      }
    }

    /* 历史模态框 */
    .history-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .history-overlay.active {
      display: flex;
    }
    .history-modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 90%;
      max-width: 500px;
      max-height: 70vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .history-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .history-modal-header h3 {
      font-family: var(--font-serif);
      font-size: 16px;
      color: var(--accent-gold);
      letter-spacing: 2px;
      margin: 0;
    }
    .history-close {
      font-size: 20px;
      color: var(--text-muted);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }
    .history-list {
      overflow-y: auto;
      padding: 8px;
    }
    .history-item {
      padding: 14px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      border: 1px solid transparent;
      margin-bottom: 6px;
    }
    .history-item:hover {
      background: rgba(201,169,110,0.06);
      border-color: rgba(201,169,110,0.15);
    }
    .history-item-empty {
      text-align: center;
      color: var(--text-muted);
      padding: 40px;
      font-size: 13px;
    }
    .history-item-title {
      font-size: 14px;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    .history-item-meta {
      font-size: 11px;
      color: var(--text-muted);
    }
    .history-item-count {
      display: inline-block;
      margin-left: 8px;
      padding: 1px 8px;
      border-radius: 10px;
      background: var(--accent-gold-dim);
      color: var(--accent-gold);
      font-size: 10px;
    }

    /* 只读模式 */
    .readonly-bar {
      display: none;
      padding: 10px 20px;
      background: rgba(201,169,110,0.08);
      border-top: 1px solid var(--border-gold);
      text-align: center;
      font-size: 12px;
      color: var(--accent-gold);
      letter-spacing: 1px;
    }
    .readonly-bar.active {
      display: block;
    }
    .group-input-area.readonly {
      opacity: 0.4;
      pointer-events: none;
    }
    .group-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      gap: 16px;
      padding: 40px;
      text-align: center;
    }
    .group-empty-icon {
      font-size: 48px;
      opacity: 0.5;
    }
    .group-empty h3 {
      font-family: var(--font-serif);
      font-size: 18px;
      color: var(--accent-gold);
      letter-spacing: 2px;
    }
    .group-empty p {
      font-size: 13px;
      line-height: 1.8;
      max-width: 400px;
    }
  </style>
</head>
<body>
  <div class="group-page">
    <!-- 顶部横栏 ========== -->
    <div class="group-header">
      <div class="group-header-left">
        <a href="/philosopher-mode.html" class="header-back">← 返回</a>
        <div class="group-header-title-block">
          <div class="group-header-title">哲思圆桌</div>
          <div class="group-header-sub">多位哲学家在线思辨</div>
        </div>
      </div>
      <div class="group-header-online">
        <span class="dot"></span>
        <span id="onlineCount">多人在线</span>
      </div>
    </div>

    <div class="group-body">
      <!-- 左侧参与者 -->
      <aside class="group-sidebar" id="sidebar">
        <div class="group-sidebar-title">在线哲学家</div>
        <div id="participantList"></div>
      </aside>

      <!-- 主聊天区 -->
      <main class="group-main">
        <div class="group-messages" id="messageArea">
          <div class="group-empty">
            <div class="group-empty-icon">⚔️</div>
            <h3>哲思圆桌</h3>
            <p>多位哲学家已就座，等待你的话题。<br>提出一个哲学问题，让他们展开辩论。</p>
          </div>
        </div>

        <!-- 输入区 -->
        <div class="group-input-area" id="inputArea">
          <div class="group-tools">
            <button class="group-tool-btn" onclick="clearChat()" title="清空会话">清空</button>
            <button class="group-tool-btn" onclick="loadHistory()" title="加载历史">历史</button>
          </div>
          <div class="group-input-wrap">
            <textarea class="group-input" id="inputBox" placeholder="输入话题或问题，按Enter发送..." rows="1"></textarea>
            <button class="group-send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
          </div>
        </div>

        <!-- 只读提示 -->
        <div class="readonly-bar" id="readonlyBar">
          <span>📖 历史记录 · 只读模式</span>
          <button class="group-tool-btn" onclick="exitHistoryMode()" style="margin-left:12px;padding:4px 12px;font-size:11px;">退出历史</button>
          <span style="margin-left:8px;opacity:0.6;">— 或点击「清空」归档并开始新对话</span>
        </div>
      </main>
    </div>
  </div>

  <script>
    // ========== CSRF Token ==========
    let csrfToken = null;
    async function ensureCsrfToken() {
      if (csrfToken) return csrfToken;
      try {
        const res = await fetch('/api/csrf-token', { credentials: 'include' });
        const data = await res.json();
        csrfToken = data.csrfToken;
        return csrfToken;
      } catch (e) {
        console.warn('获取 CSRF token 失败:', e);
        return null;
      }
    }

    // ========== 状态 ==========
    let philosophers = [];
    let messages = [];
    let sessionId = null;
    let isSending = false;
    let currentSpeakers = []; // 本轮发言队列
    let silenceList = [];     // 本轮沉默者

    // ========== 初始化 ==========
    async function init() {
      const res = await fetch('/api/philosophers');
      philosophers = await res.json();
      renderParticipants();

      const saved = localStorage.getItem('groupChatSession');
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          sessionId = parsed.sessionId;
          messages = parsed.messages || [];
          isReadonly = parsed.isReadonly || false;
          if (messages.length > 0) {
            renderMessages();
            if (isReadonly) enterReadonlyMode();
          }
        } catch(e) {}
      }
    }

    function renderParticipants() {
      const list = document.getElementById('participantList');
      list.innerHTML = philosophers.map(p => `
        <div class="group-participant" data-id="${p.id}" onclick="showPhilosopherInfo('${p.id}')">
          <div class="group-participant-avatar">${p.avatar}</div>
          <div class="group-participant-info">
            <div class="group-participant-name">${p.name}</div>
            <div class="group-participant-status" id="status-${p.id}">观察中</div>
          </div>
        </div>
      `).join('');
    }

    function setPhilosopherStatus(id, status, icon) {
      const el = document.getElementById(`status-${id}`);
      if (!el) return;
      const statusText = { 'speaking': '🔊 正在发言', 'waiting': '💭 聆听中', 'silenced': '😶 沉默', 'observing': '观察中' };
      el.textContent = icon || statusText[status] || status;
      el.className = 'group-participant-status' + (status === 'speaking' ? ' thinking' : '');

      document.querySelectorAll('.group-participant').forEach(p => p.classList.remove('active'));
      if (status === 'speaking') {
        const p = document.querySelector(`.group-participant[data-id="${id}"]`);
        if (p) p.classList.add('active');
      }
    }

    function resetAllStatus() {
      philosophers.forEach(p => setPhilosopherStatus(p.id, 'observing', '观察中'));
    }

    // ========== 消息渲染 ==========
    function renderMessages() {
      const area = document.getElementById('messageArea');
      if (messages.length === 0) {
        area.innerHTML = `
          <div class="group-empty">
            <div class="group-empty-icon">⚔️</div>
            <h3>哲思圆桌</h3>
            <p>多位哲学家已就座，等待你的话题。<br>提出一个哲学问题，让他们展开辩论。</p>
          </div>`;
        return;
      }

      area.innerHTML = messages.map((m, i) => {
        if (m.type === 'system') {
          return `<div class="msg-system">${escapeHtml(m.content)}</div>`;
        }
        if (m.type === 'thinking') {
          const p = philosophers.find(x => x.id === m.philosopherId);
          return `
            <div class="msg-row philosopher thinking" id="thinking-${m.id}">
              <div class="msg-avatar">${p ? p.avatar : '💭'}</div>
              <div class="msg-content-wrap">
                <div class="msg-sender">${p ? p.name : '哲学家'} <span class="time">${formatTime(m.time)}</span></div>
                <div class="msg-bubble">
                  <div class="thinking-dots"><span></span><span></span><span></span></div>
                </div>
              </div>
            </div>`;
        }
        if (m.type === 'silence') {
          return `<div class="msg-system" style="opacity:0.6;">${escapeHtml(m.content)}</div>`;
        }
        const isUser = m.role === 'user';
        const p = isUser ? null : philosophers.find(x => x.id === m.philosopherId);
        const userAvatar = '👤';
        const userName = '霁光';
        return `
          <div class="msg-row ${isUser ? 'user' : 'philosopher'}">
            <div class="msg-avatar ${isUser ? 'user-avatar' : ''}">${isUser ? userAvatar : (p ? p.avatar : '🧠')}</div>
            <div class="msg-content-wrap">
              <div class="msg-sender">${isUser ? userName : (p ? p.name : '哲学家')} <span class="time">${formatTime(m.time)}</span></div>
              <div class="msg-bubble">${mdToHtml(escapeHtml(m.content))}</div>
            </div>
          </div>`;
      }).join('');

      area.scrollTop = area.scrollHeight;
    }

    function addMessage(msg) {
      messages.push(msg);
      saveSession();
      renderMessages();
    }

    // ========== 发送消息 —— SSE流式 ==========
    async function sendMessage() {
      if (isReadonly) {
        alert('当前为历史记录只读模式，点击「清空」开始新对话');
        return;
      }
      const input = document.getElementById('inputBox');
      const text = input.value.trim();
      if (!text || isSending) return;

      isSending = true;
      document.getElementById('sendBtn').disabled = true;
      input.value = '';
      input.style.height = 'auto';

      // 添加用户消息
      addMessage({ id: 'msg_' + Date.now(), role: 'user', content: text, time: Date.now(), type: 'normal' });

      // 清空旧状态
      resetAllStatus();
      currentSpeakers = [];
      silenceList = [];

      // 获取CSRF token
      const token = await ensureCsrfToken();

      // 准备SSE POST（用fetch + ReadableStream处理，因为EventSource不支持POST）
      try {
        const response = await fetch('/api/group-chat/message', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            ...(token ? { 'x-csrf-token': token } : {})
          },
          body: JSON.stringify({
            message: text,
            sessionId,
            history: messages.slice(-15).map(m => ({ role: m.role, content: m.content, philosopherId: m.philosopherId }))
          })
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          addMessage({ id: 'err_' + Date.now(), role: 'system', content: '出错：' + (errData.error || response.statusText), time: Date.now(), type: 'system' });
          isSending = false;
          document.getElementById('sendBtn').disabled = false;
          return;
        }

        // 读取SSE流
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n\n');
          buffer = lines.pop() || ''; // 最后一行可能不完整

          for (const chunk of lines) {
            parseSSEChunk(chunk);
          }
        }

        // 处理剩余buffer
        if (buffer.trim()) parseSSEChunk(buffer);

      } catch (err) {
        addMessage({ id: 'err_' + Date.now(), role: 'system', content: '网络错误：' + err.message, time: Date.now(), type: 'system' });
      } finally {
        isSending = false;
        document.getElementById('sendBtn').disabled = false;
        // 重置所有状态为观察中
        setTimeout(resetAllStatus, 1000);
      }
    }

    function parseSSEChunk(chunk) {
      const lines = chunk.split('\n');
      let event = 'message';
      let dataStr = '';

      for (const line of lines) {
        if (line.startsWith('event: ')) event = line.slice(7);
        else if (line.startsWith('data: ')) dataStr = line.slice(6);
      }

      if (!dataStr) return;
      try {
        const data = JSON.parse(dataStr);
        handleSSEEvent(event, data);
      } catch (e) {
        console.warn('SSE parse error:', e, dataStr);
      }
    }

    function handleSSEEvent(event, data) {
      switch (event) {
        case 'selection':
          sessionId = data.sessionId;
          currentSpeakers = data.speakers || [];
          silenceList = data.silenced || [];

          // 显示选择结果
          if (silenceList.length > 0) {
            const names = silenceList.map(s => s.name || s.philosopherId).join('、');
            addMessage({ id: 'sil_' + Date.now(), role: 'system', content: `${names} 选择了沉默`, time: Date.now(), type: 'silence' });
          }

          // 设置等待状态
          for (const s of currentSpeakers) {
            setPhilosopherStatus(s.philosopherId, 'waiting');
          }
          for (const s of silenceList) {
            setPhilosopherStatus(s.philosopherId, 'silenced', '😶 沉默');
          }
          break;

        case 'speaker_start':
          setPhilosopherStatus(data.philosopherId, 'speaking');
          // 其他人改为聆听中
          for (const s of currentSpeakers) {
            if (s.philosopherId !== data.philosopherId) {
              setPhilosopherStatus(s.philosopherId, 'waiting');
            }
          }
          break;

        case 'reply':
          setPhilosopherStatus(data.philosopherId, 'observing');
          addMessage({
            id: 'reply_' + Date.now() + '_' + data.philosopherId,
            role: 'assistant',
            philosopherId: data.philosopherId,
            content: data.reply,
            time: Date.now(),
            type: 'normal'
          });
          break;

        case 'system':
          addMessage({ id: 'sys_' + Date.now(), role: 'system', content: data.content, time: Date.now(), type: 'system' });
          break;

        case 'error':
          if (data.philosopherId) {
            setPhilosopherStatus(data.philosopherId, 'observing');
            addMessage({ id: 'err_' + Date.now(), role: 'system', content: `${data.philosopherId} 发言失败：${data.error}`, time: Date.now(), type: 'system' });
          } else {
            addMessage({ id: 'err_' + Date.now(), role: 'system', content: '错误：' + data.error, time: Date.now(), type: 'system' });
          }
          break;

        case 'done':
          // 讨论结束
          if (data.speakerCount !== undefined) {
            const total = (data.speakerCount || 0) + (data.silencedCount || 0);
            addMessage({
              id: 'done_' + Date.now(),
              role: 'system',
              content: `✦ 本轮讨论结束 — ${data.speakerCount}位哲学家发言，${data.silencedCount}位沉默`,
              time: Date.now(),
              type: 'system'
            });
          }
          break;
      }
    }

    // ========== 只读模式 ==========
    let isReadonly = false;

    function enterReadonlyMode() {
      isReadonly = true;
      document.getElementById('inputArea').classList.add('readonly');
      document.getElementById('readonlyBar').classList.add('active');
      document.getElementById('inputBox').placeholder = '历史记录 · 不可发送';
    }

    function exitReadonlyMode() {
      isReadonly = false;
      document.getElementById('inputArea').classList.remove('readonly');
      document.getElementById('readonlyBar').classList.remove('active');
      document.getElementById('inputBox').placeholder = '输入话题或问题，按Enter发送...';
    }

    // ========== 退出历史模式（回到当前活跃session） ==========
    async function exitHistoryMode() {
      try {
        // 查找当前用户的活跃session（未归档的）
        const res = await fetch('/api/group-chat/sessions?active=true');
        const data = await res.json();
        const activeSessions = (data.sessions || []).filter(s => !s.ended_at);

        if (activeSessions.length > 0) {
          // 有活跃session，加载它
          const active = activeSessions[0];
          sessionId = active.id;
          messages = [];
          // 尝试加载消息
          const msgRes = await fetch(`/api/group-chat/history?sessionId=${active.id}`);
          const msgData = await msgRes.json();
          if (msgData.messages) {
            messages = msgData.messages.map((m, i) => ({
              id: 'curr_' + active.id + '_' + i,
              role: m.speaker_type === 'user' ? 'user' : 'assistant',
              philosopherId: m.speaker_id,
              content: m.content,
              time: new Date(m.created_at).getTime(),
              type: 'normal'
            }));
          }
          renderMessages();
          exitReadonlyMode();
          saveSession();
        } else {
          // 没有活跃session，创建新的
          const token = await ensureCsrfToken();
          const headers = token ? { 'x-csrf-token': token, 'Content-Type': 'application/json' } : { 'Content-Type': 'application/json' };
          const startRes = await fetch('/api/group-chat/start', { method: 'POST', headers });
          const startData = await startRes.json();
          if (startData.sessionId) {
            sessionId = startData.sessionId;
            messages = [];
            renderMessages();
            exitReadonlyMode();
            saveSession();
          }
        }
      } catch(e) {
        console.error('退出历史模式失败:', e);
      }
    }

    // ========== 清空/归档 ==========
    async function clearChat() {
      if (!confirm('确定归档当前对话并开启新轮次？')) return;
      // 归档当前session
      try {
        const token = await ensureCsrfToken();
        const headers = token ? { 'x-csrf-token': token } : {};
        const res = await fetch('/api/group-chat/clear', { method: 'POST', headers });
        const data = await res.json();
        if (data.sessionId) {
          sessionId = data.sessionId;
          messages = [];
          localStorage.removeItem('groupChatSession');
          renderMessages();
          exitReadonlyMode();
        }
      } catch(e) {
        console.error('归档失败:', e);
      }
    }

    // ========== 历史列表 ==========
    async function loadHistory() {
      try {
        const res = await fetch('/api/group-chat/sessions');
        const data = await res.json();
        renderHistoryList(data.sessions || []);
        document.getElementById('historyOverlay').classList.add('active');
      } catch(e) {
        console.error('加载历史失败:', e);
        renderHistoryList([]);
        document.getElementById('historyOverlay').classList.add('active');
      }
    }

    function renderHistoryList(sessions) {
      const list = document.getElementById('historyList');
      if (!sessions || sessions.length === 0) {
        list.innerHTML = '<div class="history-item-empty">暂无归档的历史对话</div>';
        return;
      }

      list.innerHTML = sessions.map(s => {
        const start = new Date(s.created_at);
        const end = s.ended_at ? new Date(s.ended_at) : null;
        const startStr = `${start.getMonth()+1}月${start.getDate()}日 ${start.getHours().toString().padStart(2,'0')}:${start.getMinutes().toString().padStart(2,'0')}`;
        const endStr = end ? `${end.getMonth()+1}月${end.getDate()}日 ${end.getHours().toString().padStart(2,'0')}:${end.getMinutes().toString().padStart(2,'0')}` : '进行中';
        const topic = s.current_topic || '哲思圆桌';
        const count = s.msg_count || s.message_count || 0;
        return `
          <div class="history-item" onclick="viewHistorySession(${s.id})"
            data-session-id="${s.id}"
          >
            <div class="history-item-title">${escapeHtml(topic)}</div>
            <div class="history-item-meta">
              ${startStr} — ${endStr}
              <span class="history-item-count">${count} 条消息</span>
            </div>
          </div>
        `;
      }).join('');
    }

    function closeHistoryModal(e) {
      if (e && e.target !== document.getElementById('historyOverlay')) return;
      document.getElementById('historyOverlay').classList.remove('active');
    }

    // ========== 查看历史session（只读） ==========
    async function viewHistorySession(sid) {
      closeHistoryModal();
      try {
        const res = await fetch(`/api/group-chat/history?sessionId=${sid}`);
        const data = await res.json();
        if (!data.messages || data.messages.length === 0) {
          alert('该会话没有消息');
          return;
        }

        // 切换到该session，进入只读模式
        sessionId = sid;
        messages = data.messages.map((m, i) => ({
          id: 'hist_' + sid + '_' + i,
          role: m.speaker_type === 'user' ? 'user' : 'assistant',
          philosopherId: m.speaker_id,
          content: m.content,
          time: new Date(m.created_at).getTime(),
          type: 'normal'
        }));

        renderMessages();
        enterReadonlyMode();
        saveSession();
      } catch(e) {
        console.error('加载历史session失败:', e);
      }
    }

    function showPhilosopherInfo(id) {
      const p = philosophers.find(x => x.id === id);
      if (!p) return;
      alert(`${p.name}（${p.nameEn}）\n${p.years}\n\n${p.quote}`);
    }

    function saveSession() {
      localStorage.setItem('groupChatSession', JSON.stringify({ sessionId, messages, isReadonly }));
    }

    // ========== 辅助函数 ==========
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function mdToHtml(text) {
      return text
        .replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--accent-gold);">$1</strong>')
        .replace(/\n/g, '<br>');
    }

    function formatTime(ts) {
      const d = new Date(ts);
      return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    }

    // ========== 事件 ==========
    document.getElementById('inputBox').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    document.getElementById('inputBox').addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    // 启动
    init();
  </script>

  <!-- 历史模态框 -->
  <div class="history-overlay" id="historyOverlay" onclick="closeHistoryModal(event)">
    <div class="history-modal" onclick="event.stopPropagation()">
      <div class="history-modal-header">
        <h3>对话历史</h3>
        <button class="history-close" onclick="closeHistoryModal()">×</button>
      </div>
      <div class="history-list" id="historyList">
        <div class="history-item-empty">加载中...</div>
      </div>
    </div>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>修改个人信息 - 霁光</title>
  <link rel="stylesheet" href="/style.css?v=2">
  <style>
    html, body { overflow-y: auto !important; height: auto !important; min-height: 100vh; }
    .publish-page {
      min-height: 100vh;
      padding: 80px 20px 60px;
      max-width: 720px;
      margin: 0 auto;
    }
    .publish-header {
      text-align: center;
      margin-bottom: 40px;
      padding-top: 20px;
    }
    .publish-header h1 {
      font-family: var(--font-serif);
      font-size: 32px;
      letter-spacing: 8px;
      font-weight: 400;
      color: var(--text-primary);
    }

    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block; font-size: 12px; color: var(--text-secondary);
      margin-bottom: 8px; letter-spacing: 2px; text-transform: uppercase;
    }
    .form-group input,
    .form-group textarea {
      width: 100%; background: transparent; border: none;
      border-bottom: 1px solid rgba(255,255,255,0.08); border-radius: 0;
      padding: 12px 4px; color: var(--text-primary); font-size: 14px;
      font-family: var(--font-sans); outline: none; transition: border-color 0.3s;
    }
    .form-group input:focus,
    .form-group textarea:focus { border-bottom-color: var(--accent-gold); }
    .form-group textarea { min-height: 80px; line-height: 1.8; resize: vertical; }
    .form-group input[type="file"] { display: none; }

    .form-actions {
      display: flex; gap: 12px; margin-top: 24px;
      position: sticky; bottom: 20px; padding: 16px 0;
      background: linear-gradient(to top, var(--bg-primary) 60%, transparent);
    }
    .btn-primary {
      background: var(--accent-gold); border: none; border-radius: 8px;
      padding: 12px 32px; color: var(--bg-primary); font-size: 14px;
      cursor: pointer; letter-spacing: 2px; transition: opacity 0.2s;
      font-family: var(--font-sans);
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary {
      background: transparent; border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 24px; color: var(--text-secondary);
      font-size: 14px; cursor: pointer; letter-spacing: 1px;
      font-family: var(--font-sans); transition: all 0.3s;
    }
    .btn-secondary:hover { border-color: var(--accent-gold); color: var(--accent-gold); }

    .success-msg {
      background: rgba(7,193,96,0.1); color: #07c160;
      padding: 12px 16px; border-radius: 6px; margin-bottom: 16px;
      font-size: 13px; display: none; text-align: center; letter-spacing: 1px;
    }

    /* ===== 头像裁剪器 ===== */
    .avatar-crop-trigger {
      width: 120px; height: 120px; border-radius: 50%;
      border: 2px dashed var(--border); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 13px; letter-spacing: 1px;
      overflow: hidden; position: relative; transition: border-color 0.3s;
    }
    .avatar-crop-trigger:hover { border-color: var(--accent-gold); color: var(--accent-gold); }
    .avatar-crop-trigger img {
      width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0;
    }
    .avatar-crop-trigger .hint {
      position: relative; z-index: 2; pointer-events: none;
    }
    .avatar-crop-trigger.has-img .hint { display: none; }

    .crop-modal-overlay {
      position: fixed; inset: 0; z-index: 3000;
      background: rgba(12,12,14,0.92); backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center;
      padding: 20px;
    }
    .crop-modal-overlay.active { display: flex; }
    .crop-modal {
      background: var(--bg-secondary); border: 1px solid var(--border);
      border-radius: 12px; padding: 24px; max-width: 520px; width: 100%;
    }
    .crop-modal h3 {
      font-family: var(--font-serif); font-size: 16px; letter-spacing: 3px;
      margin-bottom: 20px; font-weight: 400;
    }
    .crop-stage {
      display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap;
    }
    .crop-viewport {
      width: 300px; height: 300px; position: relative;
      overflow: hidden; border-radius: 8px;
      background: #000; flex-shrink: 0; cursor: grab;
      border: 1px solid var(--border);
      touch-action: none;
    }
    .crop-viewport:active { cursor: grabbing; }
    .crop-viewport img {
      position: absolute; top: 50%; left: 50%;
      transform-origin: center center;
      user-select: none; pointer-events: none;
      max-width: none; max-height: none;
    }
    .crop-mask {
      position: absolute; inset: 0; pointer-events: none; z-index: 2;
    }
    .crop-mask::before {
      content: ''; position: absolute; inset: 0;
      background: rgba(0,0,0,0.55);
      mask: radial-gradient(circle at center, transparent 130px, black 131px);
      -webkit-mask: radial-gradient(circle at center, transparent 130px, black 131px);
    }
    .crop-mask::after {
      content: ''; position: absolute;
      width: 260px; height: 260px; top: 50%; left: 50%; transform: translate(-50%,-50%);
      border: 2px solid var(--accent-gold); border-radius: 50%; pointer-events: none;
    }
    .crop-controls {
      flex: 1; min-width: 160px;
    }
    .crop-preview-wrap {
      text-align: center; margin-bottom: 20px;
    }
    .crop-preview-label {
      font-size: 11px; color: var(--text-muted); letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .crop-preview-circle {
      width: 120px; height: 120px; border-radius: 50%;
      overflow: hidden; margin: 0 auto; border: 2px solid var(--accent-gold);
      background: #000;
    }
    .crop-preview-circle canvas {
      width: 100%; height: 100%; display: block;
    }
    .zoom-slider {
      margin-top: 16px;
    }
    .zoom-slider label {
      font-size: 11px; color: var(--text-muted); letter-spacing: 2px;
      display: block; margin-bottom: 8px;
    }
    .zoom-slider input[type="range"] {
      width: 100%; accent-color: var(--accent-gold);
      background: transparent;
    }
    .crop-btns {
      display: flex; gap: 12px; margin-top: 24px; justify-content: flex-end;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(201,169,110,0.2); border-radius: 3px; }

    @media (max-width: 560px) {
      .crop-stage { flex-direction: column; align-items: center; }
      .crop-viewport { width: 280px; height: 280px; }
    }
  </style>
</head>
<body>

  <a href="/" class="btn-back">返回</a>

  <div class="publish-page">
    <div class="publish-header">
      <h1>修改个人信息</h1>
    </div>

    <div class="success-msg" id="successMsg">保存成功！</div>

    <form id="profileForm">
      <div class="form-group">
        <label>头像</label>
        <input type="file" id="profileAvatar" accept="image/*">
        <div class="avatar-crop-trigger" id="avatarTrigger" onclick="document.getElementById('profileAvatar').click()">
          <img id="avatarDisplay" src="" alt="" style="display:none;">
          <span class="hint" id="avatarHint">点击上传头像</span>
        </div>
      </div>

      <div class="form-group">
        <label>名字</label>
        <input type="text" id="profileName" placeholder="霁光">
      </div>
      <div class="form-group">
        <label>简介</label>
        <textarea id="profileBio" placeholder="介绍你自己..."></textarea>
      </div>
      <div class="form-group">
        <label>所在地</label>
        <input type="text" id="profileLocation" placeholder="广州">
      </div>
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="profileEmail" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>微信号</label>
        <input type="text" id="profileWechat" placeholder="微信号">
      </div>
      <div class="form-actions">
        <button type="submit" class="btn-primary">保存修改</button>
      </div>
    </form>
  </div>

  <!-- 头像裁剪弹窗 -->
  <div class="crop-modal-overlay" id="cropModal">
    <div class="crop-modal" onclick="event.stopPropagation()">
      <h3>调整头像</h3>
      <div class="crop-stage">
        <div class="crop-viewport" id="cropViewport">
          <img id="cropImg" src="" alt="">
          <div class="crop-mask"></div>
        </div>
        <div class="crop-controls">
          <div class="crop-preview-wrap">
            <div class="crop-preview-label">预览</div>
            <div class="crop-preview-circle">
              <canvas id="cropPreviewCanvas" width="120" height="120"></canvas>
            </div>
          </div>
          <div class="zoom-slider">
            <label>缩放</label>
            <input type="range" id="zoomSlider" min="0" max="100" value="0">
          </div>
          <div class="crop-btns">
            <button class="btn-secondary" onclick="cancelCrop()">取消</button>
            <button class="btn-primary" onclick="confirmCrop()">确认</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 隐藏 canvas 用于最终裁剪 -->
  <canvas id="finalCanvas" width="400" height="400" style="display:none;"></canvas>

  <script src="/script.js?v=2"></script>
  <script>
    /* ===== 头像裁剪器 ===== */
    const cropImg = document.getElementById('cropImg');
    const cropViewport = document.getElementById('cropViewport');
    const zoomSlider = document.getElementById('zoomSlider');
    const cropPreviewCanvas = document.getElementById('cropPreviewCanvas');
    const finalCanvas = document.getElementById('finalCanvas');

    let cropState = { x: 0, y: 0, scale: 1, imgW: 0, imgH: 0 };
    let isDragging = false, dragStart = { x: 0, y: 0 };
    let croppedBlob = null;

    const CROP_DIAMETER = 260; // 裁剪圆直径
    const VP_SIZE = 300;       // 视口尺寸

    // 计算保证不"虚空"的最小缩放：图片显示后必须覆盖 260x260 的圆框
    function getMinScale() {
      return Math.max(CROP_DIAMETER / cropState.imgW, CROP_DIAMETER / cropState.imgH);
    }

    // 钳制偏移：保证圆框不超出图片
    function clampOffset() {
      const halfW = cropState.imgW * cropState.scale / 2;
      const halfH = cropState.imgH * cropState.scale / 2;
      const circleR = CROP_DIAMETER / 2; // 130
      // 圆框左边界 = VP中心 - circleR，右边界 = VP中心 + circleR
      // 图片左边界 = VP中心 - halfW + x，必须 <= 圆框左边界
      // 图片右边界 = VP中心 + halfW + x，必须 >= 圆框右边界
      const xMax = halfW - circleR;           // 左边界对齐
      const xMin = circleR - halfW;           // 右边界对齐（负值）
      const yMax = halfH - circleR;
      const yMin = circleR - halfH;
      cropState.x = Math.max(xMin, Math.min(xMax, cropState.x));
      cropState.y = Math.max(yMin, Math.min(yMax, cropState.y));
    }

    // 平滑设置缩放（带 slider 同步）
    function setScale(s) {
      const min = getMinScale();
      cropState.scale = Math.max(min, Math.min(min * 4, s));
      // 缩放后偏移可能越界，重新钳制
      clampOffset();
      // 同步 slider（以 minScale 为 0%，maxScale 为 100% 映射到 0-100）
      const pct = (cropState.scale - min) / (min * 3) * 100;
      zoomSlider.value = Math.max(0, Math.min(100, pct));
      updateCropTransform();
    }

    document.getElementById('profileAvatar').onchange = function() {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          cropImg.src = img.src;
          cropState.imgW = img.naturalWidth;
          cropState.imgH = img.naturalHeight;
          cropState.x = 0;
          cropState.y = 0;
          // 初始缩放到最小（刚好覆盖圆框，不虚空）
          setScale(getMinScale());
          document.getElementById('cropModal').classList.add('active');
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
      this.value = '';
    };

    function updateCropTransform() {
      cropImg.style.transform = `translate(calc(-50% + ${cropState.x}px), calc(-50% + ${cropState.y}px)) scale(${cropState.scale})`;
      drawPreview();
    }

    // slider 是抽象比例 0~100，映射到 [minScale, minScale*4]
    zoomSlider.oninput = function() {
      const min = getMinScale();
      const pct = parseInt(this.value) / 100;
      const newScale = min + pct * (min * 3);
      cropState.scale = newScale;
      clampOffset();
      updateCropTransform();
    };

    // 鼠标拖动
    cropViewport.addEventListener('mousedown', e => {
      isDragging = true;
      dragStart = { x: e.clientX - cropState.x, y: e.clientY - cropState.y };
    });
    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      cropState.x = e.clientX - dragStart.x;
      cropState.y = e.clientY - dragStart.y;
      clampOffset();
      updateCropTransform();
    });
    window.addEventListener('mouseup', () => { isDragging = false; });

    // 触摸拖动
    cropViewport.addEventListener('touchstart', e => {
      if (e.touches.length !== 1) return;
      isDragging = true;
      dragStart = { x: e.touches[0].clientX - cropState.x, y: e.touches[0].clientY - cropState.y };
    }, { passive: false });
    window.addEventListener('touchmove', e => {
      if (!isDragging || e.touches.length !== 1) return;
      cropState.x = e.touches[0].clientX - dragStart.x;
      cropState.y = e.touches[0].clientY - dragStart.y;
      clampOffset();
      updateCropTransform();
    }, { passive: false });
    window.addEventListener('touchend', () => { isDragging = false; });

    // 滚轮缩放
    cropViewport.addEventListener('wheel', e => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? -0.03 : 0.03;
      setScale(cropState.scale + delta);
    }, { passive: false });

    function drawPreview() {
      const ctx = cropPreviewCanvas.getContext('2d');
      const previewSize = 120;
      ctx.clearRect(0, 0, previewSize, previewSize);

      const actualImgW = cropState.imgW * cropState.scale;
      const actualImgH = cropState.imgH * cropState.scale;
      const imgLeft = (VP_SIZE - actualImgW) / 2 + cropState.x;
      const imgTop = (VP_SIZE - actualImgH) / 2 + cropState.y;

      const circleCX = VP_SIZE / 2;
      const circleCY = VP_SIZE / 2;
      const circleR = CROP_DIAMETER / 2;

      const srcX = (circleCX - circleR - imgLeft) / cropState.scale;
      const srcY = (circleCY - circleR - imgTop) / cropState.scale;
      const srcW = (circleR * 2) / cropState.scale;
      const srcH = (circleR * 2) / cropState.scale;

      ctx.save();
      ctx.beginPath();
      ctx.arc(previewSize/2, previewSize/2, previewSize/2, 0, Math.PI * 2);
      ctx.clip();
      ctx.drawImage(cropImg, srcX, srcY, srcW, srcH, 0, 0, previewSize, previewSize);
      ctx.restore();
    }

    function closeCrop() {
      document.getElementById('cropModal').classList.remove('active');
      // 不重置 croppedBlob — 它可能在 confirmCrop 后还需要用于表单提交
    }
    function cancelCrop() {
      document.getElementById('cropModal').classList.remove('active');
      croppedBlob = null;
    }

    function confirmCrop() {
      // 用 finalCanvas (400x400) 生成高质量圆形裁剪图
      const ctx = finalCanvas.getContext('2d');
      const outSize = 400;
      ctx.clearRect(0, 0, outSize, outSize);

      const actualImgW = cropState.imgW * cropState.scale;
      const actualImgH = cropState.imgH * cropState.scale;
      const imgLeft = (300 - actualImgW) / 2 + cropState.x;
      const imgTop = (300 - actualImgH) / 2 + cropState.y;

      const circleCX = 150;
      const circleCY = 150;
      const circleR = 130;

      const srcX = (circleCX - circleR - imgLeft) / cropState.scale;
      const srcY = (circleCY - circleR - imgTop) / cropState.scale;
      const srcW = (circleR * 2) / cropState.scale;
      const srcH = (circleR * 2) / cropState.scale;

      ctx.save();
      ctx.beginPath();
      ctx.arc(outSize/2, outSize/2, outSize/2, 0, Math.PI * 2);
      ctx.clip();
      ctx.drawImage(cropImg, srcX, srcY, srcW, srcH, 0, 0, outSize, outSize);
      ctx.restore();

      finalCanvas.toBlob(blob => {
        croppedBlob = blob;
        const url = URL.createObjectURL(blob);
        document.getElementById('avatarDisplay').src = url;
        document.getElementById('avatarDisplay').style.display = 'block';
        document.getElementById('avatarTrigger').classList.add('has-img');
        closeCrop();
      }, 'image/jpeg', 0.92);
    }

    /* ===== 表单 ===== */
    async function loadProfile() {
      try {
        const p = await get('/api/profile');
        document.getElementById('profileName').value = p.name || '';
        document.getElementById('profileBio').value = p.bio || '';
        document.getElementById('profileLocation').value = p.location || '';
        document.getElementById('profileEmail').value = p.email || '';
        document.getElementById('profileWechat').value = p.wechat || '';
        if (p.avatar) {
          document.getElementById('avatarDisplay').src = p.avatar;
          document.getElementById('avatarDisplay').style.display = 'block';
          document.getElementById('avatarTrigger').classList.add('has-img');
        }
      } catch(e) {}
    }

    document.getElementById('profileForm').onsubmit = async e => {
      e.preventDefault();
      console.log('[SUBMIT] croppedBlob:', croppedBlob, 'size:', croppedBlob ? croppedBlob.size : null);
      const data = new FormData();
      data.append('name', document.getElementById('profileName').value);
      data.append('bio', document.getElementById('profileBio').value);
      data.append('location', document.getElementById('profileLocation').value);
      data.append('email', document.getElementById('profileEmail').value);
      data.append('wechat', document.getElementById('profileWechat').value);
      if (croppedBlob) {
        data.append('avatar', croppedBlob, 'avatar.jpg');
      }
      try {
        const res = await fetch('/api/profile', { method: 'PUT', body: data, credentials: 'same-origin' });
        const json = await res.json();
        console.log('[SUBMIT] response:', res.status, json);
        if (!res.ok) throw new Error(json.error);
        showSuccess();
      } catch(err) { alert(err.message); }
    };

    function showSuccess() {
      const msg = document.getElementById('successMsg');
      msg.style.display = 'block';
      setTimeout(() => msg.style.display = 'none', 3000);
    }

    loadProfile();
  </script>
</body>
</html>

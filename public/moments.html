<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>朋友圈 - 霁光</title>
  <link rel="stylesheet" href="/style.css?v=2">
  <style>
    .moments-page { min-height: 100vh; padding: 80px 20px 40px; }
    .moments-header { text-align: center; margin-bottom: 40px; padding-top: 20px; }
    .moments-header h1 { font-family: var(--font-serif); font-size: 32px; letter-spacing: 8px; font-weight: 400; }
    .moments-header p { font-size: 12px; color: var(--text-muted); letter-spacing: 3px; margin-top: 8px; }
    .moments-feed { max-width: 600px; margin: 0 auto; }
    .lightbox { position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,0.92); display: none; align-items: center; justify-content: center; }
    .lightbox.active { display: flex; }
    .lightbox img { max-width: 90%; max-height: 90%; object-fit: contain; }
    .lightbox-close { position: absolute; top: 24px; right: 24px; color: #fff; font-size: 32px; cursor: pointer; opacity: 0.6; }
  </style>
</head>
<body style="background:var(--bg-primary);">
  <a href="/" style="position:absolute;top:20px;left:24px;color:var(--text-muted);text-decoration:none;font-size:13px;letter-spacing:2px;z-index:50;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:6px 14px;transition:all 0.3s;" onmouseover="this.style.color='var(--accent-gold)';this.style.borderColor='rgba(201,169,110,0.4)';this.style.transform='scale(1.05)'" onmouseout="this.style.color='var(--text-muted)';this.style.borderColor='var(--border)';this.style.transform='scale(1)'">← 返回主页</a>

  <div class="moments-page">
    <div class="moments-header">
      <h1>朋友圈</h1>
      <p>MOMENTS</p>
    </div>
    <div class="moments-feed" id="momentsFeed">
      <p style="text-align:center;color:var(--text-muted);padding:40px;">加载中...</p>
    </div>
  </div>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <span class="lightbox-close">&times;</span>
    <img id="lightboxImg" src="">
  </div>

  <!-- 评论操作面板 -->
  <div class="comment-sheet-overlay" id="commentSheetOverlay" onclick="closeCommentSheet()">
    <div class="comment-sheet" onclick="event.stopPropagation()">
      <div class="comment-sheet-title">评论</div>
      <div class="comment-sheet-text" id="commentSheetText"></div>
      <div class="comment-sheet-actions" id="commentSheetActions"></div>
      <div class="comment-sheet-close" onclick="closeCommentSheet()">取消</div>
    </div>
  </div>

  <!-- 回复输入弹窗 -->
  <div class="reply-modal-overlay" id="replyModalOverlay" onclick="closeReplyModal()">
    <div class="reply-modal" onclick="event.stopPropagation()">
      <h4>回复</h4>
      <div class="reply-target" id="replyTargetText"></div>
      <textarea id="replyInput" placeholder="写点什么..."></textarea>
      <div class="reply-modal-btns">
        <button class="comment-sheet-btn" onclick="closeReplyModal()">取消</button>
        <button class="comment-sheet-btn" style="background:var(--accent-gold);color:var(--bg-primary);border-color:var(--accent-gold);" onclick="submitReply()">发送</button>
      </div>
    </div>
  </div>

  <script src="/script.js?v=2"></script>
  <script src="/moments-core.js"></script>
  <script>initMoments();</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>关于我 - 霁光</title>
  <link rel="stylesheet" href="/style.css?v=2">
  <style>
    .about-page { min-height: 100vh; padding: 80px 20px 60px; }
    .about-container { max-width: 600px; margin: 0 auto; text-align: center; padding-top: 40px; }
    .about-avatar-wrap { position: relative; display: inline-block; margin-bottom: 32px; }
    .about-avatar { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent-gold); display: block; }
    .about-avatar-placeholder { width: 140px; height: 140px; border-radius: 50%; border: 2px solid var(--accent-gold); display: flex; align-items: center; justify-content: center; font-family: var(--font-serif); font-size: 56px; color: var(--accent-gold); background: var(--bg-card); margin: 0 auto; }
    .about-name { font-family: var(--font-serif); font-size: 36px; letter-spacing: 10px; margin-bottom: 12px; }
    .about-location { font-size: 13px; color: var(--accent-gold); letter-spacing: 4px; margin-bottom: 24px; }
    .about-bio { font-size: 15px; color: var(--text-secondary); line-height: 2.2; max-width: 480px; margin: 0 auto 40px; letter-spacing: 1px; white-space: pre-wrap; }
    .about-divider { width: 40px; height: 1px; background: var(--accent-gold); margin: 0 auto 40px; opacity: 0.5; }
    .about-links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-bottom: 40px; }
    .about-link { display: inline-flex; align-items: center; gap: 8px; padding: 10px 24px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; color: var(--text-secondary); text-decoration: none; font-size: 13px; letter-spacing: 1px; transition: all 0.3s; }
    .about-link:hover { border-color: var(--accent-gold); color: var(--accent-gold); background: rgba(201,169,110,0.05); transform: scale(1.06); box-shadow: 0 0 20px rgba(201,169,110,0.08); }
    .about-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; max-width: 400px; margin: 0 auto 40px; }
    .about-stat { padding: 20px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; transition: all 0.3s; }
    .about-stat:hover { transform: scale(1.05); border-color: rgba(201,169,110,0.25); box-shadow: 0 0 16px rgba(201,169,110,0.06); }
    .about-stat-num { font-family: var(--font-serif); font-size: 28px; color: var(--accent-gold); margin-bottom: 4px; }
    .about-stat-label { font-size: 11px; color: var(--text-muted); letter-spacing: 2px; }
    .about-quote { font-family: var(--font-serif); font-size: 18px; color: var(--text-muted); letter-spacing: 4px; line-height: 2; margin-top: 40px; opacity: 0.7; }
  </style>
</head>
<body style="background:var(--bg-primary);">
  <a href="/" class="btn-back">返回</a>

  <div class="about-page">
    <div class="about-container" id="aboutContainer">
      <div class="about-avatar-wrap" id="avatarWrap">
        <div class="about-avatar-placeholder">霁</div>
      </div>
      
      <div class="about-name" id="aboutName">霁光</div>
      <div class="about-location" id="aboutLocation">📍 广州</div>
      <div class="about-bio" id="aboutBio">记录生活，沉淀思考，分享成长。

华南理工大学 AI 先进技术拔尖班。
喜欢写小说、学 SolidWorks、拍照片。\n
这里是我在互联网世界的一席之地。\n欢迎常来坐坐。</div>
      
      <div class="about-divider"></div>
      
      <div class="about-links" id="aboutLinks">
        <a class="about-link" href="#" id="linkEmail">✉️ 邮箱</a>
        <a class="about-link" href="#" id="linkWechat">💬 微信</a>
      </div>
      
      <a href="/story.html" class="about-link" style="margin:0 auto 32px;display:block;max-width:200px;justify-content:center;"
        onmouseover="this.style.transform='scale(1.06)';this.style.borderColor='var(--accent-gold)';this.style.boxShadow='0 0 20px rgba(201,169,110,0.08)'"
        onmouseout="this.style.transform='scale(1)';this.style.borderColor='var(--border)';this.style.boxShadow='none'"
      >
        📖 我的故事
      </a>
      
      <div class="about-stats" id="aboutStats">
        <div class="about-stat">
          <div class="about-stat-num" id="statPosts">0</div>
          <div class="about-stat-label">朋友圈</div>
        </div>
        <div class="about-stat">
          <div class="about-stat-num" id="statBlogs">0</div>
          <div class="about-stat-label">博客</div>
        </div>
        <div class="about-stat">
          <div class="about-stat-num">∞</div>
          <div class="about-stat-label">可能性</div>
        </div>
      </div>
      
      <div class="about-quote">「山川异域，风月同天」</div>
    </div>
  </div>

  <script src="/script.js?v=2"></script>
  <script>
    async function initAbout() {
      try {
        const [profile, posts, blogs] = await Promise.all([
          get('/api/profile').catch(() => null),
          get('/api/posts').catch(() => []),
          get('/api/blogs').catch(() => [])
        ]);
        
        if (profile) {
          document.getElementById('aboutName').textContent = profile.name || '霁光';
          document.getElementById('aboutLocation').textContent = '📍 ' + (profile.location || '广州');
          if (profile.bio) {
            document.getElementById('aboutBio').textContent = profile.bio;
          }
          if (profile.avatar) {
            document.getElementById('avatarWrap').innerHTML = `<img class="about-avatar" src="${profile.avatar}" alt="">`;
          }
          if (profile.email) {
            document.getElementById('linkEmail').href = 'mailto:' + profile.email;
            document.getElementById('linkEmail').textContent = '✉️ 邮箱：' + profile.email;
          }
          if (profile.wechat) {
            document.getElementById('linkWechat').textContent = '💬 微信号：' + profile.wechat;
            document.getElementById('linkWechat').removeAttribute('href');
          }
        }
        
        document.getElementById('statPosts').textContent = posts.length;
        document.getElementById('statBlogs').textContent = blogs.length;
      } catch (e) {
        console.log('加载个人信息失败', e);
      }
    }

    initAbout();
  </script>
</body>
</html>
